<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Grade - Test Run | DTech Services</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --header-bg: #0b1120;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header img { height: 40px; cursor: pointer; }

        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .nav-links a:hover { background-color: var(--bg-card); }
        .nav-links a.primary-btn {
            background-color: var(--accent-blue);
            color: white;
        }
        .nav-links a.primary-btn:hover { background-color: var(--accent-hover); }

        main {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--accent-blue);
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .grade-btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .grade-btn:hover {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        footer {
            background-color: var(--header-bg);
            color: var(--text-muted);
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 1rem; }
            .grade-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="DTech Services Logo" onclick="window.location.href='index.html'">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Log In</a>
            <a href="signup.html" class="primary-btn">Sign Up</a>
        </div>
    </header>

    <main>
        <h1>Select Your Grade</h1>
        <p>Choose a grade to test run our quiz platform. (10 questions per quiz)</p>

        <div class="grade-grid" id="grade-container">
            <!-- Buttons generated by JS -->
        </div>
    </main>

    <footer id="dynamic-footer">
        <p>&copy; <span id="footer-year">2024</span> DTech Services</p>
        <p>Empowering the youth through digital innovation</p>
        <a href="https://legal.dtech-services.co.za">Terms & Conditions</a>
    </footer>

    <script>
        // Redirect to dashboard if logged in
        if (localStorage.getItem("user_id")) {
            window.location.href = "dashboard.html";
        }

        const container = document.getElementById('grade-container');

        // Generate grades 12 down to 1
        for (let i = 12; i >= 1; i--) {
            const btn = document.createElement('button');
            btn.className = 'grade-btn';
            btn.textContent = `Grade ${i}`;
            btn.onclick = () => {
                localStorage.setItem('test_run_grade', `grade${i}`);
                localStorage.setItem('is_test_run', 'true');
                window.location.href = 'test_run_subjects.html';
            };
            container.appendChild(btn);
        }

        const currentYear = new Date().getFullYear();
        document.getElementById('footer-year').textContent = `2020–${currentYear}`;
    </script>
</body>
</html>
