<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings - Quiz Platform</title>

<style>
:root{
    --bg-dark:#0f172a;
    --bg-card:#1e293b;
    --text-main:#f8fafc;
    --text-muted:#94a3b8;
    --accent-blue:#3b82f6;
    --accent-hover:#2563eb;
    --input-bg:#0f172a;
    --border-color:#334155;
    --header-bg:#0b1120;
}

*{
    box-sizing:border-box;
}

html, body{
    width:100%;
    max-width:100%;
    overflow-x:hidden;
}

body{
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    padding:0;
    background:var(--bg-dark);
    color:var(--text-main);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

header{
    background:var(--header-bg);
    padding:1rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border-color);
    position:sticky;
    top:0;
    z-index:100;
    width:100%;
    max-width:100%;
}

header > div{
    display:flex;
    align-items:center;
    gap:1rem;
    min-width:0;
}

header h2{
    margin:0;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

nav{
    display:flex;
    gap:1.5rem;
    align-items:center;
    flex-wrap:wrap;
}

nav a{
    color:var(--text-muted);
    text-decoration:none;
    font-weight:500;
    white-space:nowrap;
}
nav a:hover{
    color:var(--accent-blue);
}

.container{
    width:min(600px, calc(100% - 1rem));
    margin:1.5rem auto;
    padding:1.5rem;
    background:var(--bg-card);
    border-radius:12px;
    border:1px solid var(--border-color);
    overflow:hidden;
}

h1{
    text-align:center;
    margin-top:0;
}

.avatar-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:2rem;
}

.avatar-preview{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--border-color);
    margin-bottom:1rem;
    background:var(--input-bg);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-main);
    font-size:2.5rem;
    font-weight:bold;
    flex-shrink:0;
}

.avatar-upload-btn{
    background:var(--border-color);
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    transition:background 0.2s;
    user-select:none;
}

.avatar-upload-btn:hover{
    background:var(--text-muted);
}

.avatar-upload-btn.uploading{
    opacity:0.6;
    pointer-events:none;
    cursor:wait;
}

#avatar-msg{
    margin-top:0.5rem;
    font-size:0.9rem;
    min-height:1.5rem;
    color:var(--text-muted);
    text-align:center;
}

input[type=file]{
    display:none;
}

form{
    display:flex;
    flex-direction:column;
    gap:1rem;
}

input{
    width:100%;
    padding:12px;
    background:var(--input-bg);
    border:1px solid var(--border-color);
    border-radius:6px;
    color:white;
    font-size:1rem;
}

input::placeholder{
    color:var(--text-muted);
}

input:focus{
    outline:none;
    border-color:var(--accent-blue);
}

button{
    padding:12px;
    background:var(--accent-blue);
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-size:1rem;
    transition:background 0.2s;
}

button:hover:not(:disabled){
    background:var(--accent-hover);
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.message{
    margin-top:1rem;
    padding:10px;
    border-radius:6px;
    display:none;
    text-align:center;
    word-break:break-word;
}

.message.success{
    background:#064e3b;
    color:#34d399;
    border:1px solid #34d399;
}

.message.error{
    background:#450a0a;
    color:#f87171;
    border:1px solid #f87171;
}

#loading{
    text-align:center;
    margin:3rem 1rem 0;
    color:var(--text-muted);
}

#profile-content{
    display:none;
}

.autocomplete-wrapper{
    position:relative;
    width:100%;
}

.autocomplete-items{
    position:absolute;
    border:1px solid var(--border-color);
    border-top:none;
    z-index:99;
    top:100%;
    left:0;
    right:0;
    background-color:var(--bg-card);
    border-radius:0 0 6px 6px;
    max-height:200px;
    overflow-y:auto;
    display:none;
    text-align:left;
}

.autocomplete-items div{
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid var(--border-color);
    color:var(--text-main);
    font-size:0.95rem;
}

.autocomplete-items div:hover{
    background-color:rgba(255,255,255,0.05);
}

.autocomplete-items div:last-child{
    border-bottom:none;
}

/* Hamburger Menu */
.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
    gap:5px;
    z-index:101;
    flex-shrink:0;
    padding:0.25rem;
    margin-left:-0.25rem;
}

.hamburger div{
    width:25px;
    height:3px;
    background-color:var(--text-main);
    transition:all 0.3s ease;
    border-radius:999px;
}

/* Footer Styles */
footer{
    background-color:var(--header-bg, #0b1120);
    color:var(--text-muted, #94a3b8);
    text-align:center;
    padding:1.5rem 1rem;
    margin-top:auto;
    border-top:1px solid var(--border-color, #334155);
    font-size:0.9rem;
}
footer p{ margin:0.3rem 0; }
footer a{
    color:var(--accent-blue, #3b82f6);
    text-decoration:none;
    font-weight:500;
}
footer a:hover{ text-decoration:underline; }

@media (max-width: 768px){
    header{
        padding:0.85rem 1rem;
        gap:0.75rem;
    }

    .hamburger{
        display:flex;
    }

    header h2{
        font-size:1.05rem;
    }

    nav{
        display:none;
        flex-direction:column;
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        background-color:var(--bg-card);
        border-bottom:1px solid var(--border-color);
        padding:0.75rem 0;
        z-index:1000;
        box-shadow:0 4px 6px rgba(0,0,0,0.1);
        gap:0.25rem;
    }

    nav.active{
        display:flex;
    }

    nav a,
    nav button{
        width:calc(100% - 1rem);
        margin:0.25rem 0.5rem;
        text-align:left;
        border-radius:6px;
    }

    nav a{
        padding:0.75rem 0.9rem;
    }

    .btn-logout{
        margin:0.25rem 0.5rem !important;
        width:calc(100% - 1rem);
    }

    .container{
        width:calc(100% - 0.75rem);
        margin:1rem auto;
        padding:1rem 0.85rem;
        border-radius:10px;
    }

    .avatar-preview{
        width:96px;
        height:96px;
        font-size:2rem;
    }

    .avatar-upload-btn{
        padding:8px 12px;
        font-size:0.95rem;
    }

    input{
        padding:11px;
        font-size:0.95rem;
    }

    button{
        padding:11px;
        font-size:0.95rem;
    }

    .autocomplete-items div{
        font-size:0.9rem;
        padding:9px;
    }
}

@media (max-width: 480px){
    header{
        padding:0.75rem 0.75rem;
    }

    header h2{
        font-size:0.98rem;
    }

    .container{
        width:calc(100% - 0.5rem);
        padding:0.9rem 0.7rem;
        margin:0.75rem auto;
    }

    .avatar-preview{
        width:88px;
        height:88px;
        font-size:1.8rem;
    }

    .avatar-section{
        margin-bottom:1.5rem;
    }

    #loading{
        margin-top:2rem;
        font-size:0.95rem;
    }
}
</style>
</head>

<body>

<header>
    <div>
        <div class="hamburger" id="hamburger-menu" aria-label="Menu" role="button" tabindex="0">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <img src="logo.png" alt="Dtech Logo" style="height: 30px; cursor: pointer; object-fit: contain; flex-shrink: 0;" onclick="window.location.href='dashboard.html'">
        <h2 id="page-title-grade">Settings</h2>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="subjects.html">Take Quiz</a>
        <a href="leaderboard.html">Grade Leaderboards</a>
        <a href="global_leaderboard.html">Global Leaderboard</a>
    </nav>
</header>

<div id="loading">Loading profile...</div>

<div class="container" id="profile-content">
    <h1>Edit Profile</h1>

    <div class="avatar-section">
        <img id="avatar-preview" class="avatar-preview" alt="Profile avatar">
        <label for="avatarInput" class="avatar-upload-btn" id="uploadBtnLabel">Change Avatar</label>
        <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/webp,image/gif">
        <div id="avatar-msg"></div>
    </div>

    <form id="profileForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="text" id="name" placeholder="First Name">
        <input type="text" id="surname" placeholder="Surname">

        <div class="autocomplete-wrapper">
            <input type="text" id="school" placeholder="School Name (e.g. Pretoria Boys High School)" autocomplete="off">
            <div id="school-autocomplete-list" class="autocomplete-items"></div>
        </div>

        <input type="password" id="password" placeholder="New Password (optional)">
        <button type="submit" id="saveBtn">Save Changes</button>
    </form>

    <div id="statusMessage" class="message"></div>
</div>

<script>
const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";
const IMGBB_KEY = "cedf418c6d844af9c47a7775a17161a6";
const userId = localStorage.getItem("user_id");

if (!userId) {
    window.location.href = "login.html";
}

function showMessage(msg, isError = false) {
    const el = document.getElementById("statusMessage");
    el.textContent = msg;
    el.className = "message " + (isError ? "error" : "success");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 5000);
}

async function loadProfile() {
    try {
        const res = await fetch(`${API_URL}/api/user/${userId}`);
        if (!res.ok) throw new Error("Failed to load profile");
        const data = await res.json();

        if (data.grade) {
            localStorage.setItem("user_grade", data.grade);
        } else {
            localStorage.setItem("user_grade", "grade12");
        }

        document.getElementById("username").value = data.username || "";
        document.getElementById("name").value = data.name || "";
        document.getElementById("surname").value = data.surname || "";
        document.getElementById("school").value = data.school || "";

        updateAvatarDisplay(data);

        document.getElementById("loading").style.display = "none";
        document.getElementById("profile-content").style.display = "block";
    } catch (e) {
        console.error("Profile load error:", e);
        document.getElementById("loading").innerHTML = `
            Failed to load profile.
            <button onclick="location.reload()" style="margin-left: 1rem; padding: 0.5rem 1rem;">Retry</button>
        `;
    }
}

// Autocomplete Logic
let schools = [];

async function fetchSchools() {
    try {
        const res = await fetch(`${API_URL}/api/schools`);
        if (res.ok) {
            const data = await res.json();
            schools = data.schools || [];
        }
    } catch (err) {
        console.error("Failed to fetch schools list", err);
    }
}

fetchSchools();

const schoolInput = document.getElementById("school");
const autocompleteList = document.getElementById("school-autocomplete-list");

schoolInput.addEventListener("input", function() {
    const val = this.value.trim();
    autocompleteList.innerHTML = '';

    if (!val) {
        autocompleteList.style.display = 'none';
        return;
    }

    const matches = schools.filter(s => s.toLowerCase().includes(val.toLowerCase())).slice(0, 8);

    if (matches.length > 0) {
        autocompleteList.style.display = 'block';
        matches.forEach(match => {
            const div = document.createElement("div");
            div.textContent = match;
            div.addEventListener("click", function() {
                schoolInput.value = match;
                autocompleteList.style.display = 'none';
            });
            autocompleteList.appendChild(div);
        });
    } else {
        autocompleteList.style.display = 'none';
    }
});

// Close autocomplete when clicking outside
document.addEventListener("click", function(e) {
    if (!schoolInput.contains(e.target) && !autocompleteList.contains(e.target)) {
        autocompleteList.style.display = 'none';
    }
});

function updateAvatarDisplay(userData) {
    const avatarPreview = document.getElementById("avatar-preview");

    if (userData.avatar_url && userData.avatar_url.trim() !== "" && userData.avatar_url !== 'null') {
        avatarPreview.src = userData.avatar_url;
        avatarPreview.style.display = "block";
        avatarPreview.style.backgroundColor = "transparent";
        avatarPreview.style.fontSize = "";
        avatarPreview.innerText = "";
    } else {
        avatarPreview.src = "";
        avatarPreview.style.display = "flex";
        avatarPreview.style.alignItems = "center";
        avatarPreview.style.justifyContent = "center";
        avatarPreview.style.backgroundColor = "var(--accent-blue)";
        avatarPreview.style.fontSize = "2.5rem";

        const firstName = userData.name || "";
        const lastName = userData.surname || "";
        const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
        avatarPreview.innerText = initials || "?";
    }
}

// =============================================
// METHOD 1: Upload using FormData with file object
// =============================================
async function uploadToImgbbMethod1(file) {
    const formData = new FormData();
    formData.append('image', file);

    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: 'POST',
        body: formData
    });

    const data = await response.json();

    if (data.success && data.data && data.data.url) {
        return data.data.url;
    } else {
        throw new Error(data.error?.message || 'Upload failed');
    }
}

// =============================================
// METHOD 2: Upload using base64 string
// =============================================
async function uploadToImgbbMethod2(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = async function() {
            try {
                const base64String = reader.result;

                const formData = new FormData();
                formData.append('image', base64String);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success && data.data && data.data.url) {
                    resolve(data.data.url);
                } else {
                    reject(new Error(data.error?.message || 'Upload failed'));
                }
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
    });
}

// =============================================
// METHOD 3: Upload using URLSearchParams
// =============================================
async function uploadToImgbbMethod3(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = async function() {
            try {
                const base64String = reader.result.split(',')[1];

                const formData = new URLSearchParams();
                formData.append('key', IMGBB_KEY);
                formData.append('image', base64String);

                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });

                const data = await response.json();

                if (data.success && data.data && data.data.url) {
                    resolve(data.data.url);
                } else {
                    reject(new Error(data.error?.message || 'Upload failed'));
                }
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
    });
}

document.getElementById("avatarInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const msg = document.getElementById("avatar-msg");
    const uploadBtn = document.getElementById("uploadBtnLabel");
    const avatarPreview = document.getElementById("avatar-preview");

    const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
    if (!validTypes.includes(file.type)) {
        msg.innerText = "Invalid file type. Please use JPG, PNG, WEBP, or GIF";
        msg.style.color = "#f87171";
        e.target.value = '';
        return;
    }

    if (file.size > 5 * 1024 * 1024) {
        msg.innerText = "File too large (max 5MB)";
        msg.style.color = "#f87171";
        e.target.value = '';
        return;
    }

    const localPreviewUrl = URL.createObjectURL(file);

    avatarPreview.src = localPreviewUrl;
    avatarPreview.style.display = "block";
    avatarPreview.style.backgroundColor = "transparent";
    avatarPreview.innerText = "";

    msg.innerText = "Uploading...";
    msg.style.color = "var(--text-muted)";
    uploadBtn.classList.add("uploading");

    try {
        let imageURL = null;
        let lastError = null;

        msg.innerText = "Converting image to PNG...";
        msg.style.color = "var(--text-muted)";

        const pngBlob = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error("Canvas toBlob failed"));
                }, "image/png");
            };
            img.onerror = () => reject(new Error("Failed to load image for conversion"));
            img.src = localPreviewUrl;
        });

        const pngFile = new File([pngBlob], "avatar.png", { type: "image/png" });

        msg.innerText = "Uploading to ImgBB...";

        try {
            imageURL = await uploadToImgbbMethod1(pngFile);
        } catch (error1) {
            lastError = error1;
            try {
                imageURL = await uploadToImgbbMethod2(pngFile);
            } catch (error2) {
                lastError = error2;
                try {
                    imageURL = await uploadToImgbbMethod3(pngFile);
                } catch (error3) {
                    lastError = error3;
                    throw new Error("All upload methods failed. Last error: " + (lastError?.message || "Unknown error"));
                }
            }
        }

        if (!imageURL) {
            throw new Error("No image URL received from server");
        }

        avatarPreview.src = imageURL;

        msg.innerText = "Saving to database...";
        msg.style.color = "var(--text-muted)";

        try {
            const updateRes = await fetch(`${API_URL}/api/user/${userId}/avatar`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ avatar_url: imageURL })
            });

            if (updateRes.ok) {
                msg.innerText = "✓ Avatar updated successfully!";
                msg.style.color = "#34d399";
                showMessage("Profile picture updated!", false);
            } else {
                msg.innerText = "✓ Avatar uploaded (saved locally only)";
                msg.style.color = "#f59e0b";
            }
        } catch (dbError) {
            console.warn("Database save failed:", dbError);
            msg.innerText = "✓ Avatar uploaded (saved locally only)";
            msg.style.color = "#f59e0b";
        }

        e.target.value = '';

    } catch (err) {
        console.error("All upload methods failed:", err);
        msg.innerText = "✗ Upload failed - " + (err.message || "please try again");
        msg.style.color = "#f87171";

        try {
            const userRes = await fetch(`${API_URL}/api/user/${userId}`);
            const userData = await userRes.json();
            updateAvatarDisplay(userData);
        } catch {
            updateAvatarDisplay({ name: "", surname: "" });
        }
    } finally {
        uploadBtn.classList.remove("uploading");
        URL.revokeObjectURL(localPreviewUrl);
    }
});

document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = document.getElementById("saveBtn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    const payload = {
        username: document.getElementById("username").value.trim(),
        name: document.getElementById("name").value.trim(),
        surname: document.getElementById("surname").value.trim(),
        school: document.getElementById("school").value.trim()
    };

    if (document.getElementById("password").value) {
        payload.password = document.getElementById("password").value;
    }

    try {
        const res = await fetch(`${API_URL}/api/user/${userId}/profile`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {
            showMessage("Profile updated successfully");
            document.getElementById("password").value = "";
        } else {
            showMessage(data.error || "Update failed", true);
        }
    } catch (error) {
        console.error("Update error:", error);
        showMessage("Update failed", true);
    } finally {
        btn.disabled = false;
        btn.innerText = "Save Changes";
    }
});

loadProfile();
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        const toggleMenu = () => navMenu.classList.toggle('active');

        hamburger.addEventListener('click', toggleMenu);
        hamburger.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleMenu();
            }
        });

        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>
