<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 12 Quiz Platform - Signup</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-hover: #059669;
            --accent-blue: #3b82f6;
            --input-bg: #0f172a;
            --border-color: #334155;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: var(--bg-dark); color: var(--text-main); }
        .container { background: var(--bg-card); padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
        h1 { margin-top: 0; margin-bottom: 1.5rem; color: var(--text-main); font-weight: 600; font-size: 1.8rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; color: var(--text-main); font-size: 1rem; transition: border-color 0.2s; margin: 0; }
        input:focus { outline: none; border-color: var(--accent-green); }
        input::placeholder { color: #64748b; }
        button { width: 100%; padding: 12px; background: var(--accent-green); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: background-color 0.2s; margin-top: 0.5rem; }
        button:hover { background: var(--accent-hover); }
        .error { color: #ef4444; margin-top: 10px; display: none; font-size: 0.9rem; }
        p { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem; }
        p.help-text { text-align: left; font-size: 0.85rem; margin-top: -0.5rem; margin-bottom: 0; color: var(--text-muted); }
        a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        .autocomplete-items { position: absolute; border: 1px solid var(--border-color); border-top: none; z-index: 99; top: 100%; left: 0; right: 0; background-color: var(--bg-card); border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; display: none; text-align: left; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 0.95rem; }
        .autocomplete-items div:hover { background-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>
        <form id="signupForm">
            <input type="text" id="username" placeholder="Username (required)" required>
            <input type="password" id="password" placeholder="Password (required)" required>
            <p class="help-text">Min 8 chars, 1 uppercase, 1 number.</p>
            <input type="text" id="name" placeholder="Real Name (optional)">
            <input type="text" id="surname" placeholder="Surname (optional)">
            <select id="grade" required style="width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-size: 1rem; margin-bottom: 0;">
                <option value="" disabled selected>Select your Grade</option>
                <option value="grade12">Grade 12</option>
                <option value="grade11">Grade 11</option>
                <option value="grade10">Grade 10</option>
                <option value="grade9">Grade 9</option>
                <option value="grade8">Grade 8</option>
                <option value="grade7">Grade 7</option>
                <option value="grade6">Grade 6</option>
                <option value="grade5">Grade 5</option>
                <option value="grade4">Grade 4</option>
                <option value="grade3">Grade 3</option>
                <option value="grade2">Grade 2</option>
                <option value="grade1">Grade 1</option>
            </select>

            <div style="position: relative; width: 100%;">
                <input type="text" id="school" placeholder="School Name (e.g. Pretoria Boys High School)" autocomplete="off">
                <div id="school-autocomplete-list" class="autocomplete-items"></div>
            </div>

            <button type="submit">Create Account</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

    <script>
        const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";

        // Redirect if already logged in
        if (localStorage.getItem("user_id")) {
            window.location.href = "dashboard.html";
        }

        // Autocomplete Logic
        let schools = [];

        async function fetchSchools() {
            try {
                const res = await fetch(`${API_URL}/api/schools`);
                if (res.ok) {
                    const data = await res.json();
                    schools = data.schools || [];
                }
            } catch (err) {
                console.error("Failed to fetch schools list", err);
            }
        }

        fetchSchools();

        const schoolInput = document.getElementById("school");
        const autocompleteList = document.getElementById("school-autocomplete-list");

        schoolInput.addEventListener("input", function(e) {
            let val = this.value;
            autocompleteList.innerHTML = '';

            if (!val) {
                autocompleteList.style.display = 'none';
                return false;
            }

            let matches = schools.filter(s => s.toLowerCase().includes(val.toLowerCase()));

            if (matches.length > 0) {
                autocompleteList.style.display = 'block';
                matches.forEach(match => {
                    let div = document.createElement("div");
                    div.innerHTML = match;
                    div.addEventListener("click", function() {
                        schoolInput.value = match;
                        autocompleteList.style.display = 'none';
                    });
                    autocompleteList.appendChild(div);
                });
            } else {
                autocompleteList.style.display = 'none';
            }
        });

        // Close autocomplete when clicking outside
        document.addEventListener("click", function (e) {
            if (e.target !== schoolInput) {
                autocompleteList.style.display = 'none';
            }
        });

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const name = document.getElementById("name").value;
            const surname = document.getElementById("surname").value;
            const grade = document.getElementById("grade").value;
            const school = document.getElementById("school").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            // Validate password locally too
            if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                errorMsg.textContent = "Password must be at least 8 characters long, contain at least one capital letter and one number.";
                errorMsg.style.display = "block";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password, name, surname, grade, school })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("user_id", data.user_id);
                    window.location.href = "dashboard.html";
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "Failed to connect to the server.";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
