<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards - Grade 12 Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-silver: #94a3b8;
            --accent-bronze: #d97706;
            --border-color: #334155;
            --header-bg: #0b1120;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--accent-blue); }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header { flex-direction: row; padding: 1rem; gap: 1rem; justify-content: space-between; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }

        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 1rem 1.5rem; background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-muted); font-weight: 600; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color 0.2s; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-blue); border-bottom: 3px solid var(--accent-blue); }

        .leaderboard-content { display: none; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 0; border: 1px solid var(--border-color); overflow: hidden; }
        .leaderboard-content.active { display: block; }

        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; border-bottom: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; text-decoration: none; }
        .rank-row:last-child { border-bottom: none; }
        .rank-row:hover { background-color: rgba(255,255,255,0.05); }

        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: var(--bg-dark); border: 1px solid var(--border-color); margin-right: 1rem; }
        .user-info { display: flex; align-items: center; flex-grow: 1; }


        /* Highlight specific ranks */
        .rank-1 {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.05) 100%);
            border: 2px solid var(--accent-yellow);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            font-weight: bold;
            font-size: 1.3rem;
            transform: scale(1.02);
            z-index: 3;
            position: relative;
            margin-bottom: 1rem;
        }
        .rank-1 .user-avatar { width: 50px; height: 50px; border: 2px solid var(--accent-yellow); }
        .rank-1 .rank-num { color: var(--accent-yellow); font-size: 1.5rem; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }

        .rank-2 {
            background: linear-gradient(135deg, rgba(148, 163, 184, 0.2) 0%, rgba(148, 163, 184, 0.05) 100%);
            border: 2px solid var(--accent-silver);
            box-shadow: 0 0 10px rgba(148, 163, 184, 0.2);
            font-weight: bold;
            font-size: 1.2rem;
            transform: scale(1.01);
            z-index: 2;
            position: relative;
            margin-bottom: 0.8rem;
        }
        .rank-2 .user-avatar { width: 45px; height: 45px; border: 2px solid var(--accent-silver); }
        .rank-2 .rank-num { color: var(--accent-silver); font-size: 1.3rem; }

        .rank-3 {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.2) 0%, rgba(217, 119, 6, 0.05) 100%);
            border: 2px solid var(--accent-bronze);
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.2);
            font-weight: bold;
            font-size: 1.15rem;
            margin-bottom: 0.8rem;
        }
        .rank-3 .user-avatar { width: 45px; height: 45px; border: 2px solid var(--accent-bronze); }
        .rank-3 .rank-num { color: var(--accent-bronze); font-size: 1.2rem; }

        .crown-icon { font-size: 1.5rem; margin-right: 0.5rem; }

        @media (max-width: 480px) {
            .leaderboard-row { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .user-info { width: 100%; margin-bottom: 0.5rem; }
            .rank-xp { align-self: flex-end; font-size: 1.1rem; }
            .crown-icon { display: none; }
        }





        .top-10 { font-weight: 600; }
        .top-50 { color: var(--text-main); }
        .below-50 { color: var(--text-muted); padding: 0.8rem 1.2rem; font-size: 0.95rem; }

        .rank-num { width: 50px; font-weight: bold; color: var(--text-muted); }
        .rank-name { flex-grow: 1; }
        .rank-xp { font-weight: bold; color: var(--accent-green); }

        #loading { text-align: center; font-size: 1.2rem; padding: 3rem; color: var(--text-muted); }

        /* Grade Card Styles */
        .grade-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 2rem; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grade-header { background: rgba(0,0,0,0.2); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .grade-title { font-size: 1.5rem; font-weight: bold; color: var(--text-main); margin: 0; }
        .view-more-btn { background: var(--accent-blue); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .view-more-btn:hover { background: #2563eb; }

        .top3-container { display: flex; flex-direction: column; }
        .top3-empty { padding: 2rem; text-align: center; color: var(--text-muted); }

        /* Details View */
        #details-view { display: none; }
        .back-btn { background: var(--border-color); color: var(--text-main); border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 500; margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
        .back-btn:hover { background: #475569; }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-main);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }
        }

    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="hamburger" id="hamburger-menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <h2 style="margin:0;" id="page-title-grade">Global Leaderboard (All Grades)</h2>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="subjects.html">Take a Quiz</a>
        <a href="leaderboard.html">Grade Leaderboards</a>
        <a href="stats.html">Detailed Stats</a>
        <a href="profile.html">Profile</a>
        <button id="logoutBtn" class="btn-logout" style="margin-left: 1rem;">Logout</button>
    </nav>
</header>

<div class="container">
    <div id="loading">Loading leaderboards...</div>

    <!-- Main Grades List View -->
    <div id="grades-list-view"></div>

    <!-- Detailed Grade View -->
    <div id="details-view">
        <button class="back-btn" onclick="showGradesList()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
            Back to Grades List
        </button>
        <h2 id="details-grade-title" style="margin-top: 0;">Grade Details</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overall')">Overall</button>
            <button class="tab-btn" onclick="switchTab('mathematics')">Mathematics</button>
            <button class="tab-btn" onclick="switchTab('physics')">Physical Sciences</button>
            <button class="tab-btn" onclick="switchTab('weekly')">Weekly</button>
        </div>

        <div id="leaderboard-overall" class="leaderboard-content active"></div>
        <div id="leaderboard-mathematics" class="leaderboard-content"></div>
        <div id="leaderboard-physics" class="leaderboard-content"></div>
        <div id="leaderboard-weekly" class="leaderboard-content"></div>
    </div>
</div>

<script>
    const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";

    if (!localStorage.getItem("user_id")) {
        window.location.href = "index.html";
    }

    // Cache of leaderboards by grade
    const gradeDataCache = {};

    async function fetchAllGradesLeaderboards() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("grades-list-view").style.display = "none";
        document.getElementById("details-view").style.display = "none";

        try {
            const gradesListContainer = document.getElementById("grades-list-view");
            gradesListContainer.innerHTML = "";

            // Fetch data for grades 12 down to 1 sequentially or in parallel
            // To be efficient, we'll fetch them concurrently
            const fetchPromises = [];
            for (let i = 12; i >= 1; i--) {
                const gradeId = `grade${i}`;
                fetchPromises.push(
                    fetch(`${API_URL}/api/leaderboard?grade=${gradeId}`)
                        .then(res => res.json())
                        .then(data => ({ gradeId, title: `Grade ${i}`, data }))
                        .catch(err => ({ gradeId, title: `Grade ${i}`, data: { overall: [] }, error: err }))
                );
            }

            const results = await Promise.all(fetchPromises);

            // Sort to ensure Grade 12 is first, down to Grade 1
            results.sort((a, b) => {
                const numA = parseInt(a.gradeId.replace("grade", ""));
                const numB = parseInt(b.gradeId.replace("grade", ""));
                return numB - numA; // Descending
            });

            results.forEach(result => {
                gradeDataCache[result.gradeId] = result.data;
                renderGradeCard(result.gradeId, result.title, result.data.overall || []);
            });

            document.getElementById("loading").style.display = "none";
            document.getElementById("grades-list-view").style.display = "block";

        } catch (error) {
            console.error("Error fetching leaderboards:", error);
            document.getElementById("loading").textContent = "Failed to load leaderboards. Please refresh.";
            document.getElementById("loading").style.display = "block";
        }
    }

    function renderGradeCard(gradeId, title, overallList) {
        const container = document.getElementById("grades-list-view");

        const card = document.createElement("div");
        card.className = "grade-card";

        const header = document.createElement("div");
        header.className = "grade-header";
        header.innerHTML = `
            <h3 class="grade-title">${title}</h3>
            <button class="view-more-btn" onclick="showGradeDetails('${gradeId}', '${title}')">View More</button>
        `;
        card.appendChild(header);

        const top3Container = document.createElement("div");
        top3Container.className = "top3-container";

        const top3 = overallList.slice(0, 3);

        if (top3.length === 0) {
            top3Container.innerHTML = `<div class="top3-empty">No learners ranked yet for ${title}.</div>`;
        } else {
            top3.forEach((user, index) => {
                const row = buildRankRowHTML(user, index + 1);
                top3Container.appendChild(row);
            });
        }

        card.appendChild(top3Container);
        container.appendChild(card);
    }

    function buildRankRowHTML(user, rank) {
        const row = document.createElement("a");
        row.href = `public_profile.html?user=${encodeURIComponent(user.username)}`;
        row.className = "rank-row";

        if (rank === 1) row.classList.add("rank-1");
        else if (rank === 2) row.classList.add("rank-2");
        else if (rank === 3) row.classList.add("rank-3");
        else if (rank <= 10) row.classList.add("top-10");
        else if (rank <= 25) row.classList.add("top-25");
        else if (rank <= 50) row.classList.add("top-50");
        else row.classList.add("below-50");

        let displayName = user.username;
        if (user.name || user.surname) {
            displayName = `${user.name || ''} ${user.surname || ''}`.trim() + ` (@${user.username})`;
        }

        const avatarSrc = user.avatar_url || "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzk0YTNiOCI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDRzMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==";
        const safeUsername = user.username ? user.username.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : 'User';
        const safeAvatar = avatarSrc.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeDisplayName = displayName.replace(/</g, '&lt;').replace(/>/g, '&gt;');

        let rankDisplay = `#${rank}`;
        if (rank === 1) rankDisplay = `<span class="crown-icon">👑</span>#1`;

        row.innerHTML = `
            <div class="rank-num">${rankDisplay}</div>
            <div class="user-info">
                <img class="user-avatar" src="${safeAvatar}" alt="${safeUsername}">
                <div class="rank-name">${safeDisplayName}</div>
            </div>
            <div class="rank-xp">${user.xp.toLocaleString()} XP</div>
        `;
        return row;
    }

    function showGradeDetails(gradeId, title) {
        document.getElementById("grades-list-view").style.display = "none";
        document.getElementById("details-view").style.display = "block";
        document.getElementById("details-grade-title").textContent = `${title} Leaderboard`;

        const data = gradeDataCache[gradeId] || {};

        renderLeaderboard("leaderboard-overall", data.overall || []);
        renderLeaderboard("leaderboard-mathematics", data.math || []);
        renderLeaderboard("leaderboard-physics", data.physics || []);
        renderLeaderboard("leaderboard-weekly", data.weekly || []);

        // Reset to overall tab
        switchTab('overall');
        window.scrollTo(0, 0);
    }

    function showGradesList() {
        document.getElementById("details-view").style.display = "none";
        document.getElementById("grades-list-view").style.display = "block";
        window.scrollTo(0, 0);
    }

    function renderLeaderboard(containerId, list) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";

        if (!list || list.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding: 2rem;'>No data available yet.</p>";
            return;
        }

        list.forEach((user, index) => {
            const row = buildRankRowHTML(user, index + 1);
            container.appendChild(row);
        });
    }

    function switchTab(tabId) {
        // Update buttons
        document.querySelectorAll("#details-view .tab-btn").forEach(btn => btn.classList.remove("active"));
        if(event && event.target) {
             event.target.classList.add("active");
        } else {
             // Fallback for programmatic switch
             document.querySelector(`#details-view .tab-btn[onclick="switchTab('${tabId}')"]`).classList.add("active");
        }

        // Update content
        document.querySelectorAll("#details-view .leaderboard-content").forEach(content => {
            content.classList.remove("active");
        });
        document.getElementById(`leaderboard-${tabId}`).classList.add("active");
    }

    fetchAllGradesLeaderboards();
</script>
<script>
// Hamburger Menu Logic
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>

</body>
</html>
