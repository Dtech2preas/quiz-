name: Android Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android_app/gradlew

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Release APK
        working-directory: android_app
        env:
          APP_VERSION_TAG: "v1.0-${{ steps.vars.outputs.sha_short }}"
        run: ./gradlew :app:assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android_app/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "DTECH-Quiz-v1.0-${{ steps.vars.outputs.sha_short }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DTECH-Quiz-APK
          path: DTECH-Quiz-v1.0-${{ steps.vars.outputs.sha_short }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ steps.vars.outputs.sha_short }}
          name: DTECH Quiz v1.0-${{ steps.vars.outputs.sha_short }}
          body: |
            Automatic release

            Commit: ${{ github.sha }}
            Version: v1.0-${{ steps.vars.outputs.sha_short }}
          files: DTECH-Quiz-v1.0-${{ steps.vars.outputs.sha_short }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version.json
        run: |
          cat <<EOF > version.json
          {
            "version": "v1.0-${{ steps.vars.outputs.sha_short }}",
            "apk": "",
            "releaseDate": "$(date -u +'%Y-%m-%d')",
            "minimumVersion": "v1.0-${{ steps.vars.outputs.sha_short }}",
            "forceUpdate": false,
            "maintenance": false,
            "releaseNotes": [
              "Latest stable release"
            ]
          }
          EOF

      - name: Commit and Push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "Update version.json for release v1.0-${{ steps.vars.outputs.sha_short }} [skip ci]" || echo "No changes to commit"
          git push