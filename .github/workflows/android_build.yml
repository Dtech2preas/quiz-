name: Android Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android_app/gradlew

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Release APK
        working-directory: android_app
        env:
          APP_VERSION_TAG: "v1.0-${{ steps.vars.outputs.sha_short }}"
        run: ./gradlew :app:assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android_app/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DTECH-Quiz-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Delete existing latest release
        continue-on-error: true
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: DTECH Quiz - Latest Build
          body: |
            Automatic release

            Commit: ${{ github.sha }}
            Version: v1.0-${{ steps.vars.outputs.sha_short }}

          files: ${{ steps.sign_app.outputs.signedReleaseFile }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}