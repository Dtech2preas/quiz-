name: Generate Curriculum Datasets

on:
  workflow_dispatch:
    inputs:
      manifest_file:
        description: 'Path to the manifest JSON file'
        required: true
        default: 'manifest.json'
      target_count:
        description: 'Target questions per topic (override)'
        required: false
        type: string
        default: '50'

permissions:
  contents: write

jobs:
  generate-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate datasets
        run: |
          if [ -n "${{ github.event.inputs.target_count }}" ]; then
            python universal_generator.py --manifest "${{ github.event.inputs.manifest_file }}" --target-count "${{ github.event.inputs.target_count }}"
          else
            python universal_generator.py --manifest "${{ github.event.inputs.manifest_file }}"
          fi

      - name: Display Summary Report
        run: |
          if [ -f summary_report.md ]; then
            cat summary_report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Summary report not found."
          fi

      - name: Upload Summary Report
        uses: actions/upload-artifact@v3
        with:
          name: generation-summary-report
          path: summary_report.md
          if-no-files-found: ignore

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/ map.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generate curriculum datasets via universal generator"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
