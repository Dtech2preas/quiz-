name: Generate AI Curriculum Datasets

on:
  workflow_dispatch:
    inputs:
      grade:
        description: "Target grade (e.g., 'grade12')"
        required: true
        default: 'grade12'
      subject:
        description: "Target subject (e.g., 'mathematics')"
        required: true
        default: 'mathematics'
      topic:
        description: "Specific topic (e.g., 'Calculus')"
        required: true
      count:
        description: "Total number of questions to generate"
        required: true
        default: '100'

permissions:
  contents: write

jobs:
  generate-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install google-genai

      - name: Generate AI datasets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ./run_ai_generator.sh --grade "${{ github.event.inputs.grade }}" --subject "${{ github.event.inputs.subject }}" --topic "${{ github.event.inputs.topic }}" --count ${{ github.event.inputs.count }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/ map.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generate AI curriculum datasets"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
