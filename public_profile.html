<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Profile - Grade 12 Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --border-color: #334155;
            --header-bg: #0b1120;
            --gold: #fbbf24;
            --silver: #9ca3af;
            --bronze: #b45309;
            --badge-bg: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: var(--accent-blue); }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header { flex-direction: row; padding: 1rem; gap: 1rem; justify-content: space-between; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

        .profile-header { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }

        .avatar-lg { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; background-color: var(--bg-dark); border: 4px solid var(--accent-blue); margin-bottom: 1rem; }

        .profile-header h1 { margin: 0 0 0.5rem 0; font-size: 2rem; color: var(--text-main); }
        .profile-header .username { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 0.5rem; }
        .profile-header .grade-label { color: var(--accent-blue); font-size: 1rem; font-weight: bold; margin-bottom: 0.5rem; text-transform: capitalize; }
        .profile-header .school-label { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem; }

        .badges-container { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
        .badge { background: var(--badge-bg); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .badge.champion { color: var(--gold); border-color: var(--gold); background: rgba(251, 191, 36, 0.1); font-size: 1.1rem; padding: 0.75rem 1.5rem; }
        .badge.silver { color: #e5e7eb; border-color: #e5e7eb; background: rgba(229, 231, 235, 0.1); font-size: 1.1rem; padding: 0.75rem 1.5rem; }
        .badge.bronze { color: var(--bronze); border-color: var(--bronze); background: rgba(180, 83, 9, 0.1); font-size: 1.1rem; padding: 0.75rem 1.5rem; }

        .badge.streak { color: #f97316; border-color: #f97316; background: rgba(249, 115, 22, 0.1); }
        .badge.scholar { color: #3b82f6; border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .badge.prodigy { color: #8b5cf6; border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }

        .extravagant-bg {
            background: linear-gradient(135deg, rgba(251,191,36,0.15) 0%, rgba(30,41,59,1) 100%);
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(251,191,36,0.2);
        }
        .extravagant-avatar { border: 4px solid var(--gold); box-shadow: 0 0 15px rgba(251,191,36,0.5); transform: scale(1.1); margin-bottom: 1.5rem; }

        .btn-share { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
        .btn-share:hover { background: var(--accent-blue); color: white; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card h3 { margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--text-muted); font-weight: 500; }
        .stat-card p { margin: 0; font-size: 1.8rem; font-weight: bold; color: var(--text-main); }
        .stat-card p.highlight { color: var(--accent-blue); }

        #loading { text-align: center; font-size: 1.2rem; margin-top: 3rem; color: var(--text-muted); }
        #error-message { text-align: center; font-size: 1.2rem; margin-top: 3rem; color: #ef4444; display: none; }
        #profile-content { display: none; }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-main);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }
        }

    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="hamburger" id="hamburger-menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <h2 style="margin:0;" id="page-title-grade">User Profile</h2>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboards</a>
    </nav>
</header>

<div id="loading">Searching for user...</div>
<div id="error-message">User not found.</div>

<div class="container" id="profile-content">
    <div class="profile-header">
        <img id="profile-avatar" class="avatar-lg" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzk0YTNiOCI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDRzMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==" alt="User Avatar">
        <h1 id="profile-name">Username</h1>
        <div class="username">@<span id="profile-username">username</span></div>
        <div class="grade-label" id="profile-grade">Grade</div>
        <div class="school-label" id="profile-school" style="display: none;"></div>

        <div class="badges-container" id="badges-container">
            <!-- Badges dynamically inserted here -->
        </div>

        <button class="btn-share" id="shareBtn" onclick="shareProfile()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Share Profile
        </button>
    </div>

    <h3 style="margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color);">Player Statistics</h3>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Grade Rank</h3>
            <p id="stat-rank">-</p>
        </div>
        <div class="stat-card">
            <h3>Global Rank</h3>
            <p id="stat-global-rank">-</p>
        </div>
        <div class="stat-card">
            <h3>Total Public XP</h3>
            <p class="highlight" id="stat-xp">0</p>
        </div>
        <div class="stat-card">
            <h3>Total Personal XP</h3>
            <p class="highlight" style="color:var(--accent-green);" id="stat-personal-xp">0</p>
        </div>
        <div class="stat-card">
            <h3>Accuracy %</h3>
            <p id="stat-accuracy">0%</p>
        </div>
        <div class="stat-card">
            <h3>Questions Answered</h3>
            <p id="stat-questions">0</p>
        </div>
    </div>

    <div id="mastery-section" style="display:none; margin-bottom: 2.5rem;">
        <h3 style="margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color);">Top Mastery Topics</h3>
        <div id="mastery-container" style="display: flex; gap: 1rem; flex-wrap: wrap;"></div>
    </div>
</div>

<script>
    const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";

    const urlParams = new URLSearchParams(window.location.search);
    const targetUsername = urlParams.get('user');

    if (!targetUsername) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-message").textContent = "No user specified.";
        document.getElementById("error-message").style.display = "block";
    } else {
        loadPublicProfile(targetUsername);
    }

    async function loadPublicProfile(username) {
        try {
            const response = await fetch(`${API_URL}/api/public-user/${username}`);

            if (response.status === 404) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("error-message").style.display = "block";
                return;
            }

            if (!response.ok) throw new Error("Failed to load profile");

            const data = await response.json();

            // Populate basic info
            document.getElementById("profile-username").textContent = data.username;

            const fullName = [data.name, data.surname].filter(Boolean).join(" ");
            document.getElementById("profile-name").textContent = fullName || data.username;

            const gradeText = (data.grade || "grade12").replace('grade', 'Grade ');
            document.getElementById("profile-grade").textContent = gradeText;
            document.title = `Public Profile - ${gradeText} Quiz Platform`;

            if (data.school) {
                const schoolEl = document.getElementById("profile-school");
                schoolEl.textContent = `Representing: ${data.school}`;
                schoolEl.style.display = "block";
            }

            if (data.avatar_url) {
                document.getElementById("profile-avatar").src = data.avatar_url;
            }

            // Populate stats
            document.getElementById("stat-rank").textContent = data.ranks?.overall !== "-" ? `#${data.ranks.overall}` : "-";
            document.getElementById("stat-global-rank").textContent = data.ranks?.all_grades_overall !== "-" ? `#${data.ranks.all_grades_overall}` : "-";
            document.getElementById("stat-xp").textContent = data.total_xp || 0;
            document.getElementById("stat-personal-xp").textContent = data.personal_total_xp || 0;
            document.getElementById("stat-accuracy").textContent = `${data.accuracy_percentage || 0}%`;
            document.getElementById("stat-questions").textContent = data.questions_answered || 0;

            // Mastery Topics
            const masteryContainer = document.getElementById("mastery-container");
            masteryContainer.innerHTML = "";
            let hasMastery = false;
            if (data.topic_accuracy) {
                for (const [topic, stats] of Object.entries(data.topic_accuracy)) {
                    if (stats.total > 0) {
                        const accuracy = Math.round((stats.correct / stats.total) * 100);
                        if (accuracy >= 80) {
                            hasMastery = true;
                            const formattedTopic = topic.replace('paper1_', '').replace('paper2_', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                            masteryContainer.innerHTML += `<div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent-green); color: #34d399; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600;">⭐ ${formattedTopic} (${accuracy}%)</div>`;
                        }
                    }
                }
            }
            if (hasMastery) {
                document.getElementById("mastery-section").style.display = "block";
            }

            // Generate Dynamic Badges & Extravagant Styling
            generateBadges(data);

            document.getElementById("loading").style.display = "none";
            document.getElementById("profile-content").style.display = "block";

        } catch (error) {
            console.error(error);
            document.getElementById("loading").style.display = "none";
            document.getElementById("error-message").textContent = "Error loading user data.";
            document.getElementById("error-message").style.display = "block";
        }
    }

    function generateBadges(data) {
        const container = document.getElementById("badges-container");
        container.innerHTML = ""; // Clear existing

        const gradeRank = data.ranks?.overall;
        const globalRank = data.ranks?.all_grades_overall;
        const gradeText = (data.grade || "grade12").replace('grade', 'Grade ');

        // Extravagant styling logic
        const headerEl = document.querySelector('.profile-header');
        const avatarEl = document.getElementById('profile-avatar');
        let isExtravagant = false;

        // Grade or Global Rank checks
        if (globalRank === 1) {
            container.innerHTML += `<div class="badge champion">👑 #1 Globally</div>`;
            isExtravagant = true;
        } else if (gradeRank === 1) {
            container.innerHTML += `<div class="badge champion">🏆 #1 in ${gradeText}</div>`;
            isExtravagant = true;
        } else if (gradeRank === 2) {
            container.innerHTML += `<div class="badge silver">🥈 #2 in ${gradeText}</div>`;
            isExtravagant = true;
        } else if (gradeRank === 3) {
            container.innerHTML += `<div class="badge bronze">🥉 #3 in ${gradeText}</div>`;
            isExtravagant = true;
        } else if (gradeRank !== "-" && gradeRank <= 10) {
            container.innerHTML += `<div class="badge top10">🌟 Top 10 Elite</div>`;
        }

        if (isExtravagant) {
            headerEl.classList.add('extravagant-bg');
            avatarEl.classList.add('extravagant-avatar');
        }

        // Streak badges
        const streak = data.study_streak_days || 0;
        if (streak >= 30) {
            container.innerHTML += `<div class="badge streak" style="color: var(--gold); border-color: var(--gold);">🔥 ${streak} Day Master Streak</div>`;
        } else if (streak >= 7) {
            container.innerHTML += `<div class="badge streak">🔥 ${streak} Day Streak</div>`;
        }

        // Questions answered badges
        const qAnswered = data.questions_answered || 0;
        const qMilestones = [100, 300, 500, 1000, 1500, 2000];
        for (let i = qMilestones.length - 1; i >= 0; i--) {
            if (qAnswered >= qMilestones[i]) {
                container.innerHTML += `<div class="badge scholar">🎯 ${qMilestones[i]}+ Questions Answered</div>`;
                break;
            }
        }

        // Custom Prodigy check based on arbitrary high values since we don't return math_xp here, but we can base it on total_xp
        if (data.total_xp >= 10000) {
            container.innerHTML += `<div class="badge prodigy">🧠 Prodigy (10k+ XP)</div>`;
        }

        if (container.innerHTML === "") {
            container.innerHTML = `<span style="color: var(--text-muted); font-size: 0.9rem;">New Learner</span>`;
        }
    }

    function shareProfile() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.getElementById("shareBtn");
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ Copied to Clipboard!";
            btn.style.borderColor = "#10b981";
            btn.style.color = "#10b981";

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.borderColor = "var(--accent-blue)";
                btn.style.color = "var(--accent-blue)";
            }, 3000);
        }).catch(err => {
            alert("Failed to copy link.");
        });
    }
</script>
<script>
// Hamburger Menu Logic
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>

</body>
</html>
