<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 1–12 Quiz Platform - Login</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #0f172a;
            --border-color: #334155;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; background-color: var(--bg-dark); color: var(--text-main); }
        .container { background: var(--bg-card); padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
        h1 { margin-top: 0; margin-bottom: 1.5rem; color: var(--text-main); font-weight: 600; font-size: 1.8rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; color: var(--text-main); font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--accent-blue); }
        input::placeholder { color: #64748b; }
        button { width: 100%; padding: 12px; background: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: background-color 0.2s; margin-top: 0.5rem; }
        button:hover { background: var(--accent-hover); }
        .error { color: #ef4444; margin-top: 10px; display: none; font-size: 0.9rem; }
        p { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem; }
        a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }

        /* Footer Styles */
        footer {
            background-color: var(--header-bg, #0b1120);
            color: var(--text-muted, #94a3b8);
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: auto;
            border-top: 1px solid var(--border-color, #334155);
            font-size: 0.9rem;
        }
        footer p { margin: 0.3rem 0; }
        footer a { color: var(--accent-blue, #3b82f6); text-decoration: none; font-weight: 500; }
        footer a:hover { text-decoration: underline; }

    </style>
<script src="dtech_cosmetics.js"></script>
</head>
<body>
    <div style="flex: 1; display: flex; justify-content: center; align-items: center;"><div class="container">
        <img src="logo.png" alt="Dtech Logo" style="height: 60px; margin-bottom: 1rem;">
        <h1>Login</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div></div>

    <script>
        const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";

        // Redirect if already logged in
        if (localStorage.getItem("user_id")) {
            window.location.href = "dashboard.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("loginBtn");

            btn.disabled = true;
            btn.textContent = "Logging in...";
            errorMsg.style.display = "none";

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("user_id", data.user_id);
                    window.location.href = "dashboard.html";
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "Failed to connect to the server.";
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>

<footer id="dynamic-footer">
  <p>&copy; <span id="footer-year">2024</span> Dtech &bull; Preasx24</p>
  <p>Empowering the youth through digital innovation</p>
  <a href="https://legal.dtech-services.co.za">Terms & Conditions</a>
</footer>
<script>
    // Set dynamic year in footer
    const currentYear = new Date().getFullYear();
    document.getElementById('footer-year').textContent = `2020–${currentYear}`;
</script>

</body>
</html>
