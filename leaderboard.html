<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards - Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-silver: #94a3b8;
            --accent-bronze: #d97706;
            --border-color: #334155;
            --header-bg: #0b1120;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Compact Header / Nav */
        header {
            background: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            max-width: 100%;
        }

        header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover,
        nav a.active {
            color: var(--accent-blue);
        }

        .container {
            width: min(1000px, 100%);
            margin: 2rem auto;
            padding: 0 0.75rem;
            overflow-x: hidden;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            max-width: 100%;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            padding: 0.85rem 1.1rem;
            background: none;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s;
            flex: 0 0 auto;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom: 3px solid var(--accent-blue);
        }

        .leaderboard-content {
            display: none;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
            width: 100%;
            max-width: 100%;
        }

        .leaderboard-content.active {
            display: block;
        }

        .rank-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            max-width: 100%;
            min-width: 0;
        }

        .rank-row:last-child {
            border-bottom: none;
        }

        .rank-row:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            margin-right: 0.8rem;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
            min-width: 0;
            overflow: hidden;
        }

        .rank-num {
            width: 42px;
            font-weight: bold;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .rank-name {
            flex-grow: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .rank-xp {
            font-weight: bold;
            color: var(--accent-green);
            flex-shrink: 0;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        /* Highlight specific ranks */
        .rank-1,
        .rank-2,
        .rank-3 {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.25) 0%, rgba(251, 191, 36, 0.05) 100%);
            border: 2px solid #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            font-weight: bold;
            font-size: 1.15rem;
            transform: scale(1.01);
            z-index: 3;
            position: relative;
            margin-bottom: 0.75rem;
            border-radius: 8px;
        }

        .rank-1 .user-avatar,
        .rank-2 .user-avatar,
        .rank-3 .user-avatar {
            width: 52px;
            height: 52px;
            border: 3px solid #fbbf24;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .rank-1 .rank-num,
        .rank-2 .rank-num,
        .rank-3 .rank-num {
            color: #fbbf24;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
        }

        /* Silver styling (4-10) */
        .rank-silver {
            background: linear-gradient(135deg, rgba(148, 163, 184, 0.15) 0%, rgba(148, 163, 184, 0.05) 100%);
            border: 1px solid #94a3b8;
            font-weight: 600;
            border-left: 5px solid #94a3b8;
            margin-bottom: 0.45rem;
            border-radius: 6px;
        }

        .rank-silver .rank-num {
            color: #cbd5e1;
            font-size: 1.1rem;
        }

        .rank-silver .user-avatar {
            border: 2px solid #94a3b8;
        }

        /* Bronze styling (11-25) */
        .rank-bronze {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.15) 0%, rgba(217, 119, 6, 0.05) 100%);
            border: 1px solid #d97706;
            font-weight: 500;
            border-left: 5px solid #d97706;
            margin-bottom: 0.35rem;
            border-radius: 6px;
        }

        .rank-bronze .rank-num {
            color: #f59e0b;
            font-size: 1rem;
        }

        .rank-bronze .user-avatar {
            border: 2px solid #d97706;
        }

        /* Iron/Steel styling (26-100) */
        .rank-iron {
            background: rgba(71, 85, 105, 0.1);
            border-left: 4px solid #475569;
            margin-bottom: 0.2rem;
        }

        .rank-iron .rank-num {
            color: #94a3b8;
        }

        .below-50 {
            color: var(--text-muted);
            padding: 0.75rem 1rem;
            font-size: 0.92rem;
            opacity: 0.85;
        }

        .crown-icon {
            font-size: 1.4rem;
            margin-right: 0.35rem;
            filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.8));
        }

        #loading {
            text-align: center;
            font-size: 1.05rem;
            padding: 2.5rem 1rem;
            color: var(--text-muted);
        }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
            flex-shrink: 0;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header {
                flex-direction: row;
                padding: 0.85rem 1rem;
                gap: 1rem;
                justify-content: space-between;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-dark);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }

            .hamburger {
                display: flex;
            }

            .container {
                margin: 1rem auto;
                padding: 0 0.5rem;
            }

            .tabs {
                margin-bottom: 1rem;
            }

            .tab-btn {
                padding: 0.75rem 0.9rem;
                font-size: 0.88rem;
            }

            .rank-row {
                padding: 0.8rem 0.75rem;
                gap: 0.5rem;
            }

            .user-avatar {
                width: 32px;
                height: 32px;
                margin-right: 0.55rem;
            }

            .rank-num {
                width: 34px;
                font-size: 0.88rem;
            }

            .rank-name {
                font-size: 0.9rem;
            }

            .rank-xp {
                font-size: 0.82rem;
            }

            .rank-1,
            .rank-2,
            .rank-3 {
                font-size: 1rem;
                transform: none;
                margin-bottom: 0.55rem;
            }

            .rank-1 .user-avatar,
            .rank-2 .user-avatar,
            .rank-3 .user-avatar {
                width: 40px;
                height: 40px;
            }

            .rank-1 .rank-num,
            .rank-2 .rank-num,
            .rank-3 .rank-num {
                font-size: 1.1rem;
            }

            .rank-silver .rank-num {
                font-size: 0.96rem;
            }

            .rank-bronze .rank-num {
                font-size: 0.92rem;
            }

            .below-50 {
                padding: 0.65rem 0.75rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            header h2 {
                font-size: 1.1rem;
            }

            .rank-row {
                padding: 0.7rem 0.6rem;
            }

            .user-avatar {
                width: 28px;
                height: 28px;
            }

            .rank-num {
                width: 30px;
                font-size: 0.82rem;
            }

            .rank-name {
                font-size: 0.84rem;
            }

            .rank-xp {
                font-size: 0.76rem;
            }

            .tab-btn {
                padding: 0.7rem 0.75rem;
                font-size: 0.82rem;
            }
        }

        /* Footer Styles */
        footer {
            background-color: var(--header-bg, #0b1120);
            color: var(--text-muted, #94a3b8);
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: auto;
            border-top: 1px solid var(--border-color, #334155);
            font-size: 0.9rem;
        }

        footer p {
            margin: 0.3rem 0;
        }

        footer a {
            color: var(--accent-blue, #3b82f6);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 1rem; min-width: 0;">
        <div class="hamburger" id="hamburger-menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <img src="logo.png" alt="Dtech Logo" style="height: 30px; cursor: pointer; object-fit: contain; flex-shrink: 0;" onclick="window.location.href='dashboard.html'">
        <h2 style="margin:0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="page-title-grade">National Leaderboards</h2>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="subjects.html">Take a Quiz</a>
        <a href="stats.html">Detailed Stats</a>
        <a href="global_leaderboard.html">Global Leaderboard</a>
    </nav>
</header>

<div class="container">
    <div class="tabs" id="leaderboard-tabs">
        <!-- Dynamic tabs injected here -->
    </div>

    <div id="loading">Loading leaderboards...</div>

    <div id="leaderboards-container">
        <!-- Dynamic leaderboard contents injected here -->
    </div>
</div>

<script>
    const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";

    if (!localStorage.getItem("user_id")) {
        window.location.href = "index.html";
    }

    const userGrade = localStorage.getItem("user_grade") || "grade12";
    const gradeDisplay = userGrade.replace('grade', 'Grade ');
    document.getElementById("page-title-grade").textContent = `${gradeDisplay} Leaderboard`;
    document.title = `${gradeDisplay} Leaderboards - Quiz Platform`;

    const SUBJECT_LABELS = {
        "overall": "Overall",
        "weekly": "Weekly",
        "mathematics": "Mathematics",
        "math": "Mathematics",
        "physics": "Physical Sciences",
        "physical_sciences": "Physical Sciences",
        "life_sciences": "Life Sciences",
        "natural_sciences": "Natural Sciences",
        "mathematical_literacy": "Mathematical Literacy"
    };

    async function fetchGradeMap() {
        try {
            const response = await fetch('map.json');
            if (!response.ok) return null;
            return await response.json();
        } catch (error) {
            return null;
        }
    }

    async function setupDynamicLeaderboards() {
        const gradeMap = await fetchGradeMap();

        let gradeSubjects = ["math", "physics"];

        if (gradeMap && gradeMap[userGrade]) {
            gradeSubjects = Object.keys(gradeMap[userGrade]);
            gradeSubjects = gradeSubjects.map(s => s === "mathematics" ? "math" : s === "physical_sciences" ? "physics" : s).slice(0, 2);
        }

        const tabsContainer = document.getElementById("leaderboard-tabs");
        const boardsContainer = document.getElementById("leaderboards-container");

        tabsContainer.innerHTML = `<button class="tab-btn active" onclick="switchTab('overall', event)">Overall</button>`;
        boardsContainer.innerHTML = `<div id="leaderboard-overall" class="leaderboard-content active"></div>`;

        gradeSubjects.forEach(sub => {
            const label = SUBJECT_LABELS[sub] || sub.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
            tabsContainer.innerHTML += `<button class="tab-btn" onclick="switchTab('${sub}', event)">${label}</button>`;
            boardsContainer.innerHTML += `<div id="leaderboard-${sub}" class="leaderboard-content"></div>`;
        });

        tabsContainer.innerHTML += `<button class="tab-btn" onclick="switchTab('weekly', event)">Weekly</button>`;
        boardsContainer.innerHTML += `<div id="leaderboard-weekly" class="leaderboard-content"></div>`;

        return gradeSubjects;
    }

    async function fetchLeaderboards() {
        try {
            const subjectsToFetch = await setupDynamicLeaderboards();

            const currentGrade = localStorage.getItem("user_grade") || "grade12";
            const queryParams = subjectsToFetch.length > 0 ? `&subjects=${subjectsToFetch.join(',')}` : '';
            const response = await fetch(`${API_URL}/api/leaderboard?grade=${currentGrade}${queryParams}`);
            const data = await response.json();

            document.getElementById("loading").style.display = "none";

            renderLeaderboard("leaderboard-overall", data.overall || []);
            renderLeaderboard("leaderboard-weekly", data.weekly || []);

            subjectsToFetch.forEach(sub => {
                renderLeaderboard(`leaderboard-${sub}`, data[sub] || []);
            });

        } catch (error) {
            console.error("Error fetching leaderboards:", error);
            document.getElementById("loading").textContent = "Failed to load leaderboards. Please refresh.";
        }
    }

    function renderLeaderboard(containerId, list) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding: 2rem;'>No data available yet.</p>";
            return;
        }

        list.forEach((user, index) => {
            const rank = index + 1;
            const row = document.createElement("a");
            row.href = `public_profile.html?user=${encodeURIComponent(user.username)}`;
            row.className = "rank-row";

            if (rank === 1) row.classList.add("rank-1");
            else if (rank === 2) row.classList.add("rank-2");
            else if (rank === 3) row.classList.add("rank-3");
            else if (rank <= 10) { row.classList.add("top-10"); row.classList.add("rank-silver"); }
            else if (rank <= 25) { row.classList.add("top-25"); row.classList.add("rank-bronze"); }
            else if (rank <= 100) { row.classList.add("top-50"); row.classList.add("rank-iron"); }
            else row.classList.add("below-50");

            let displayName = user.username;
            if (user.name || user.surname) {
                displayName = `${user.name || ''} ${user.surname || ''}`.trim() + ` (@${user.username})`;
            }

            const avatarSrc = user.avatar_url || "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzk0YTNiOCI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDRzMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==";

            const safeUsername = user.username ? user.username.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : 'User';
            const safeAvatar = avatarSrc.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeDisplayName = displayName.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            let rankDisplay = `#${rank}`;
            if (rank === 1) rankDisplay = `<span class="crown-icon">👑</span>#1`;

            row.innerHTML = `
                <div class="rank-num">${rankDisplay}</div>
                <div class="user-info">
                    <img class="user-avatar" src="${safeAvatar}" alt="${safeUsername}">
                    <div class="rank-name">${safeDisplayName}</div>
                </div>
                <div class="rank-xp">${user.xp.toLocaleString()} XP</div>
            `;

            container.appendChild(row);
        });
    }

    function switchTab(tabId, event) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        event.currentTarget.classList.add("active");

        document.querySelectorAll(".leaderboard-content").forEach(content => {
            content.classList.remove("active");
        });
        document.getElementById(`leaderboard-${tabId}`).classList.add("active");
    }

    fetchLeaderboards();
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const hamburger = document.getElementById('hamburger-menu');
        const navMenu = document.getElementById('nav-menu');

        if (hamburger && navMenu) {
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                    navMenu.classList.remove('active');
                }
            });
        }
    });
</script>

<footer id="dynamic-footer">
  <p>&copy; <span id="footer-year">2024</span> Dtech &bull; Preasx24</p>
  <p>Empowering the youth through digital innovation</p>
  <a href="https://legal.dtech-services.co.za">Terms & Conditions</a>
</footer>

<script>
    const currentYear = new Date().getFullYear();
    document.getElementById('footer-year').textContent = `2020–${currentYear}`;
</script>

</body>
</html>
