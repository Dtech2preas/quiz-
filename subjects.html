<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subject - Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-cyan: #06b6d4;
            --border-color: #334155;
            --header-bg: #0b1120;
            --topic-btn-bg: #334155;
            --topic-btn-hover: #475569;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--accent-blue); }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header { flex-direction: row; padding: 1rem; gap: 1rem; justify-content: space-between; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h2 { font-weight: 600; color: var(--text-main); margin-bottom: 1.5rem; }

        .subject-btn { padding: 1.5rem; background: var(--accent-green); color: white; font-size: 1.5rem; border: none; border-radius: 12px; cursor: pointer; display: block; width: 100%; margin-bottom: 1.5rem; text-align: center; font-weight: 600; transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .subject-btn:hover { background: #059669; transform: translateY(-2px); }
        .subject-btn:active { transform: translateY(0); }

        /* Specific subject button override */
        .subject-btn.physics { background-color: var(--accent-cyan); }
        .subject-btn.physics:hover { background-color: #0891b2; }

        .topic-list { display: none; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: -0.5rem; margin-bottom: 2.5rem; border: 1px solid var(--border-color); }

        /* Grid layout for topics on larger screens */
        @media (min-width: 600px) {
            .topic-list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .topic-btn { margin-bottom: 0 !important; }
        }

        .topic-btn { padding: 1.2rem; background: var(--topic-btn-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; display: block; width: 100%; margin-bottom: 0.8rem; text-align: left; font-size: 1.05rem; transition: background-color 0.2s; font-weight: 500; }
        .topic-btn:hover { background: var(--topic-btn-hover); }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-main);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }
        }

    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="hamburger" id="hamburger-menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <h2 style="margin:0;" id="page-title-grade">Select Subject</h2>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>

        <a href="global_leaderboard.html">Global Leaderboard</a></nav>
</header>

<div class="container" id="subjects-container">
    <h2>Choose a Subject to Practice</h2>
    <!-- Subjects and Topics will be generated here dynamically based on the user's grade -->
</div>

<script>
    if (!localStorage.getItem("user_id")) {
        window.location.href = "index.html";
    }

    const userGrade = localStorage.getItem("user_grade") || "grade12";

    // Update Page Title
    const gradeDisplay = userGrade.replace('grade', 'Grade ');
    document.getElementById("page-title-grade").textContent = `${gradeDisplay} Subjects`;

    // Hardcoded Mapping of Subjects & Topics per Grade
    const GRADE_MAP = {
        "grade12": {
            "mathematics": [
                { file: "paper1_algebra.json", label: "Paper 1: Algebra" },
                { file: "paper1_calculus.json", label: "Paper 1: Calculus" },
                { file: "paper1_finance.json", label: "Paper 1: Finance" },
                { file: "paper1_functions.json", label: "Paper 1: Functions" },
                { file: "paper1_probability.json", label: "Paper 1: Probability" },
                { file: "paper1_sequences.json", label: "Paper 1: Sequences" },
                { file: "paper2_analytical_geometry.json", label: "Paper 2: Analytical Geometry" },
                { file: "paper2_geometry.json", label: "Paper 2: Euclidean Geometry" },
                { file: "paper2_statistics.json", label: "Paper 2: Statistics" },
                { file: "paper2_trigonometry.json", label: "Paper 2: Trigonometry" }
            ],
            "physics": [
                { file: "paper1_circular_motion.json", label: "Paper 1: Circular Motion" },
                { file: "paper1_mechanics.json", label: "Paper 1: Mechanics" },
                { file: "paper1_oscillations_waves.json", label: "Paper 1: Oscillations & Waves" },
                { file: "paper1_thermal_physics.json", label: "Paper 1: Thermal Physics" },
                { file: "paper1_work_energy_power.json", label: "Paper 1: Work, Energy & Power" },
                { file: "paper2_acids_bases.json", label: "Paper 2: Acids & Bases" },
                { file: "paper2_atomic_nuclear.json", label: "Paper 2: Atomic & Nuclear" },
                { file: "paper2_bonding_structure.json", label: "Paper 2: Bonding & Structure" },
                { file: "paper2_electrochemistry.json", label: "Paper 2: Electrochemistry" },
                { file: "paper2_kinetics_equilibrium.json", label: "Paper 2: Kinetics & Equilibrium" },
                { file: "paper2_stoichiometry.json", label: "Paper 2: Stoichiometry" }
            ],
            "life_sciences": [
                { file: "paper1_life_meiosis.json", label: "Paper 1: Meiosis" },
                { file: "paper1_life_reproduction_vertebrates.json", label: "Paper 1: Reproduction in Vertebrates" },
                { file: "paper1_life_human_reproduction.json", label: "Paper 1: Human Reproduction" },
                { file: "paper1_life_environment_humans.json", label: "Paper 1: Responding to the Environment (Humans)" },
                { file: "paper1_life_endocrine_system.json", label: "Paper 1: Human Endocrine System" },
                { file: "paper1_life_homeostasis.json", label: "Paper 1: Homeostasis in Humans" },
                { file: "paper1_life_environment_plants.json", label: "Paper 1: Responding to the Environment (Plants)" },
                { file: "paper1_life_human_impact.json", label: "Paper 1: Human Impact on Environment" },
                { file: "paper2_life_dna_code.json", label: "Paper 2: DNA: Code of Life" },
                { file: "paper2_life_meiosis.json", label: "Paper 2: Meiosis" },
                { file: "paper2_life_genetics.json", label: "Paper 2: Genetics and Inheritance" },
                { file: "paper2_life_evolution.json", label: "Paper 2: Evolution" }
            ]
        }
        // Additional grades will fallback or use specific maps below if added.
    };

    // Initialize map for grades 1-11 with dummy/default subsets
    // This allows the UI to render correctly for lower grades preventing them from accessing grade 12
    for (let i = 1; i <= 11; i++) {
        GRADE_MAP[`grade${i}`] = {
            "mathematics": [
                { file: "basic_addition.json", label: "Basic Addition" },
                { file: "basic_subtraction.json", label: "Basic Subtraction" }
            ]
        };
    }

    const SUBJECT_COLORS = {
        "mathematics": "", // Uses default
        "physics": "physics", // Uses specific class
        "life_sciences": "life-sciences"
    };

    const SUBJECT_LABELS = {
        "mathematics": "Mathematics",
        "physics": "Physical Sciences",
        "life_sciences": "Life Sciences"
    };

    function renderSubjects() {
        const container = document.getElementById("subjects-container");
        const userMap = GRADE_MAP[userGrade] || GRADE_MAP["grade12"];

        let html = `<h2>Choose a Subject to Practice</h2>`;

        for (const [subjectKey, topics] of Object.entries(userMap)) {
            const subjectLabel = SUBJECT_LABELS[subjectKey] || subjectKey.replace('_', ' ').replace(/\\b\\w/g, l => l.toUpperCase());

            let extraStyle = "";
            let extraClass = SUBJECT_COLORS[subjectKey] || "";
            if (subjectKey === "life_sciences") {
                extraStyle = 'style="background-color: #f59e0b;"';
                extraClass = "";
            }

            html += `
                <button class="subject-btn ${extraClass}" ${extraStyle} onclick="showTopics('${subjectKey}')">${subjectLabel}</button>
                <div id="topics-${subjectKey}" class="topic-list">
                    <div class="topic-list-grid">
            `;

            topics.forEach(topic => {
                html += `<button class="topic-btn" onclick="startQuiz('${subjectKey}', '${topic.file}')">${topic.label}</button>`;
            });

            html += `
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
    }

    function showTopics(subject) {
        // Hide all topic lists
        const allLists = document.querySelectorAll(".topic-list");
        allLists.forEach(list => list.style.display = "none");

        // Show the selected one
        const target = document.getElementById(`topics-${subject}`);
        if (target) target.style.display = "block";
    }

    function startQuiz(subject, filename) {
        // Redirect to quiz.html with query parameters
        const url = new URL("quiz.html", window.location.origin + window.location.pathname.replace('subjects.html',''));
        url.searchParams.set('subject', subject);
        url.searchParams.set('file', filename);
        window.location.href = url.toString();
    }

    // Render on load
    renderSubjects();
</script>
<script>
// Hamburger Menu Logic
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>

</body>
</html>
