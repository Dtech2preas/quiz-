<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subject - Grade 12 Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-cyan: #06b6d4;
            --border-color: #334155;
            --header-bg: #0b1120;
            --topic-btn-bg: #334155;
            --topic-btn-hover: #475569;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--accent-blue); }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h2 { font-weight: 600; color: var(--text-main); margin-bottom: 1.5rem; }

        .subject-btn { padding: 1.5rem; background: var(--accent-green); color: white; font-size: 1.5rem; border: none; border-radius: 12px; cursor: pointer; display: block; width: 100%; margin-bottom: 1.5rem; text-align: center; font-weight: 600; transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .subject-btn:hover { background: #059669; transform: translateY(-2px); }
        .subject-btn:active { transform: translateY(0); }

        /* Specific subject button override */
        .subject-btn.physics { background-color: var(--accent-cyan); }
        .subject-btn.physics:hover { background-color: #0891b2; }

        .topic-list { display: none; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: -0.5rem; margin-bottom: 2.5rem; border: 1px solid var(--border-color); }

        /* Grid layout for topics on larger screens */
        @media (min-width: 600px) {
            .topic-list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .topic-btn { margin-bottom: 0 !important; }
        }

        .topic-btn { padding: 1.2rem; background: var(--topic-btn-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; display: block; width: 100%; margin-bottom: 0.8rem; text-align: left; font-size: 1.05rem; transition: background-color 0.2s; font-weight: 500; }
        .topic-btn:hover { background: var(--topic-btn-hover); }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-main);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }
        }

    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">Select Subject</h2>
    </div>
    <div class="hamburger" id="hamburger-menu">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<div class="container">
    <h2>Choose a Subject to Practice</h2>

    <button class="subject-btn" onclick="showTopics('mathematics')">Mathematics</button>
    <div id="topics-mathematics" class="topic-list">
        <div class="topic-list-grid">
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_algebra.json')">Paper 1: Algebra</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_calculus.json')">Paper 1: Calculus</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_finance.json')">Paper 1: Finance</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_functions.json')">Paper 1: Functions</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_probability.json')">Paper 1: Probability</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper1_sequences.json')">Paper 1: Sequences</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper2_analytical_geometry.json')">Paper 2: Analytical Geometry</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper2_geometry.json')">Paper 2: Euclidean Geometry</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper2_statistics.json')">Paper 2: Statistics</button>
            <button class="topic-btn" onclick="startQuiz('mathematics', 'paper2_trigonometry.json')">Paper 2: Trigonometry</button>
        </div>
    </div>

    <button class="subject-btn physics" onclick="showTopics('physics')">Physical Sciences</button>
    <div id="topics-physics" class="topic-list">
        <div class="topic-list-grid">
            <button class="topic-btn" onclick="startQuiz('physics', 'paper1_circular_motion.json')">Paper 1: Circular Motion</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper1_mechanics.json')">Paper 1: Mechanics</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper1_oscillations_waves.json')">Paper 1: Oscillations & Waves</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper1_thermal_physics.json')">Paper 1: Thermal Physics</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper1_work_energy_power.json')">Paper 1: Work, Energy & Power</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_acids_bases.json')">Paper 2: Acids & Bases</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_atomic_nuclear.json')">Paper 2: Atomic & Nuclear</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_bonding_structure.json')">Paper 2: Bonding & Structure</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_electrochemistry.json')">Paper 2: Electrochemistry</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_kinetics_equilibrium.json')">Paper 2: Kinetics & Equilibrium</button>
            <button class="topic-btn" onclick="startQuiz('physics', 'paper2_stoichiometry.json')">Paper 2: Stoichiometry</button>
        </div>
    </div>

    <button class="subject-btn" onclick="showTopics('life_sciences')" style="background-color: #f59e0b;">Life Sciences</button>
    <div id="topics-life_sciences" class="topic-list">
        <div class="topic-list-grid">
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_meiosis.json')">Paper 1: Meiosis</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_reproduction_vertebrates.json')">Paper 1: Reproduction in Vertebrates</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_human_reproduction.json')">Paper 1: Human Reproduction</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_environment_humans.json')">Paper 1: Responding to the Environment (Humans)</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_endocrine_system.json')">Paper 1: Human Endocrine System</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_homeostasis.json')">Paper 1: Homeostasis in Humans</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_environment_plants.json')">Paper 1: Responding to the Environment (Plants)</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper1_life_human_impact.json')">Paper 1: Human Impact on Environment</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper2_life_dna_code.json')">Paper 2: DNA: Code of Life</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper2_life_meiosis.json')">Paper 2: Meiosis</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper2_life_genetics.json')">Paper 2: Genetics and Inheritance</button>
            <button class="topic-btn" onclick="startQuiz('life_sciences', 'paper2_life_evolution.json')">Paper 2: Evolution</button>
        </div>
    </div>

</div>

<script>
    if (!localStorage.getItem("user_id")) {
        window.location.href = "index.html";
    }

    function showTopics(subject) {
        document.getElementById("topics-mathematics").style.display = "none";
        document.getElementById("topics-physics").style.display = "none";

        const lifeTopics = document.getElementById("topics-life_sciences");
        if (lifeTopics) lifeTopics.style.display = "none";

        const target = document.getElementById(`topics-${subject}`);
        if (target) target.style.display = "block";
    }

    function startQuiz(subject, filename) {
        // Redirect to quiz.html with query parameters
        const url = new URL("quiz.html", window.location.origin + window.location.pathname.replace('subjects.html',''));
        url.searchParams.set('subject', subject);
        url.searchParams.set('file', filename);
        window.location.href = url.toString();
    }
</script>
<script>
// Hamburger Menu Logic
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>

</body>
</html>
