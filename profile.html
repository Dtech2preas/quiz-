<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Grade 12 Quiz Platform</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #0f172a;
            --border-color: #334155;
            --header-bg: #0b1120;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--accent-blue); }

        .container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }

        form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        label { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }
        input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; color: var(--text-main); font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent-blue); }
        button { padding: 10px; background: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: background-color 0.2s; }
        button:hover { background: var(--accent-hover); }
        button:disabled { background: var(--text-muted); cursor: not-allowed; }

        .avatar-section { text-align: center; margin-bottom: 2rem; }
        .avatar-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-blue); margin-bottom: 1rem; background-color: var(--input-bg); }
        .file-input-wrapper { margin-bottom: 1rem; }

        .message { margin-top: 10px; font-size: 0.95rem; text-align: center; display: none; padding: 10px; border-radius: 6px; }
        .message.success { background-color: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .message.error { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">Profile Settings</h2>
    </div>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="subjects.html">Take a Quiz</a>
        <a href="leaderboard.html">Leaderboards</a>
    </nav>
</header>

<div class="container">
    <div class="avatar-section">
        <img id="avatar-preview" class="avatar-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="Avatar Preview">
        <div class="file-input-wrapper">
            <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/webp" style="display: none;" onchange="previewAvatar(event)">
            <button type="button" onclick="document.getElementById('avatarInput').click()">Select Image</button>
        </div>
        <button id="uploadAvatarBtn" onclick="uploadAvatar()">Upload & Save Avatar</button>
        <div id="avatarMsg" class="message"></div>
    </div>

    <h3>Personal Details</h3>
    <form id="profileForm">
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" required>
        </div>
        <div>
            <label for="name">First Name</label>
            <input type="text" id="name">
        </div>
        <div>
            <label for="surname">Last Name</label>
            <input type="text" id="surname">
        </div>
        <div>
            <label for="password">New Password (leave blank to keep current)</label>
            <input type="password" id="password" placeholder="Min 8 chars, 1 capital, 1 number">
        </div>
        <button type="submit" id="saveProfileBtn">Save Profile Details</button>
        <div id="profileMsg" class="message"></div>
    </form>
</div>

<script>
    const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";
    const userId = localStorage.getItem("user_id");

    if (!userId) {
        window.location.href = "index.html";
    }

    // Load current data
    async function loadData() {
        try {
            const response = await fetch(`${API_URL}/api/user/${userId}`);
            if (!response.ok) throw new Error("Failed to load user data");
            const data = await response.json();

            document.getElementById('username').value = data.username || '';
            document.getElementById('name').value = data.name || '';
            document.getElementById('surname').value = data.surname || '';

            if (data.avatar_url) {
                document.getElementById('avatar-preview').src = data.avatar_url;
            }
        } catch (err) {
            console.error(err);
        }
    }

    loadData();

    function showMessage(elementId, text, isSuccess) {
        const el = document.getElementById(elementId);
        el.textContent = text;
        el.className = `message ${isSuccess ? 'success' : 'error'}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function previewAvatar(event) {
        const file = event.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                showMessage("avatarMsg", "File is too large (max 5MB).", false);
                event.target.value = '';
                return;
            }
            document.getElementById('avatar-preview').src = URL.createObjectURL(file);
        }
    }

    async function uploadAvatar() {
        const fileInput = document.getElementById("avatarInput");
        const file = fileInput.files[0];
        const btn = document.getElementById("uploadAvatarBtn");

        if (!file) {
            showMessage("avatarMsg", "Please select an image first.", false);
            return;
        }

        btn.disabled = true;
        btn.textContent = "Uploading...";

        try {
            const formData = new FormData();
            formData.append("reqtype", "fileupload");
            formData.append("fileToUpload", file);

            // Upload to Catbox
            const catboxRes = await fetch("https://catbox.moe/user/api.php", {
                method: "POST",
                body: formData
            });

            if (!catboxRes.ok) throw new Error("Catbox upload failed");

            const imageURL = await catboxRes.text();

            // Save to backend
            const backendRes = await fetch(`${API_URL}/api/user/${userId}/avatar`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ avatar_url: imageURL })
            });

            if (!backendRes.ok) throw new Error("Failed to save avatar to profile");

            showMessage("avatarMsg", "Avatar updated successfully!", true);
            document.getElementById('avatar-preview').src = imageURL;
            fileInput.value = ''; // clear input
        } catch (err) {
            showMessage("avatarMsg", err.message || "An error occurred.", false);
        } finally {
            btn.disabled = false;
            btn.textContent = "Upload & Save Avatar";
        }
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("saveProfileBtn");
        btn.disabled = true;
        btn.textContent = "Saving...";

        const payload = {
            username: document.getElementById("username").value,
            name: document.getElementById("name").value,
            surname: document.getElementById("surname").value
        };

        const pwd = document.getElementById("password").value;
        if (pwd) {
            payload.password = pwd;
        }

        try {
            const res = await fetch(`${API_URL}/api/user/${userId}/profile`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || "Failed to update profile");
            }

            showMessage("profileMsg", "Profile updated successfully!", true);
            document.getElementById("password").value = ''; // clear password field
        } catch (err) {
            showMessage("profileMsg", err.message, false);
        } finally {
            btn.disabled = false;
            btn.textContent = "Save Profile Details";
        }
    });
</script>

</body>
</html>
