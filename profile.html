<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings - Quiz Platform</title>

<style>

:root{
--bg-dark:#0f172a;
--bg-card:#1e293b;
--text-main:#f8fafc;
--text-muted:#94a3b8;
--accent-blue:#3b82f6;
--accent-hover:#2563eb;
--input-bg:#0f172a;
--border-color:#334155;
--header-bg:#0b1120;
}

body{
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
margin:0;
padding:0;
background:var(--bg-dark);
color:var(--text-main);
}

header{
background:var(--header-bg);
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border-color);
position:sticky;
top:0;
z-index:100;
}

header h2{margin:0}

nav{display:flex;gap:1.5rem}

nav a{
color:var(--text-muted);
text-decoration:none;
font-weight:500;
}

nav a:hover{color:var(--accent-blue)}

.container{
max-width:600px;
margin:2rem auto;
padding:2rem;
background:var(--bg-card);
border-radius:12px;
border:1px solid var(--border-color);
}

h1{text-align:center}

.avatar-section{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:2rem;
}

.avatar-preview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--border-color);
margin-bottom:1rem;
background: var(--input-bg);
display: flex;
align-items: center;
justify-content: center;
color: var(--text-main);
font-size: 2.5rem;
font-weight: bold;
}

.avatar-upload-btn{
background:var(--border-color);
padding:8px 14px;
border-radius:6px;
cursor:pointer;
transition: background 0.2s;
}

.avatar-upload-btn:hover{
background:var(--text-muted);
}

.avatar-upload-btn.uploading {
  opacity: 0.6;
  pointer-events: none;
  cursor: wait;
}

.avatar-upload-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#avatar-msg {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  min-height: 1.5rem;
  color: var(--text-muted);
}

input[type=file]{display:none}

form{
display:flex;
flex-direction:column;
gap:1rem;
}

input{
padding:12px;
background:var(--input-bg);
border:1px solid var(--border-color);
border-radius:6px;
color:white;
font-size:1rem;
}

input:focus {
  outline: none;
  border-color: var(--accent-blue);
}

button{
padding:12px;
background:var(--accent-blue);
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:1rem;
transition: background 0.2s;
}

button:hover:not(:disabled){
background:var(--accent-hover);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.message{
margin-top:1rem;
padding:10px;
border-radius:6px;
display:none;
text-align:center;
}

.message.success{
background:#064e3b;
color:#34d399;
border: 1px solid #34d399;
}

.message.error{
background:#450a0a;
color:#f87171;
border: 1px solid #f87171;
}

#loading{
text-align:center;
margin-top:3rem;
color:var(--text-muted);
}

#profile-content{display:none}

</style>
</head>

<body>

<header>
<h2>Settings</h2>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="subjects.html">Take Quiz</a>
<a href="leaderboard.html">Leaderboards</a>
</nav>

</header>

<div id="loading">Loading profile...</div>

<div class="container" id="profile-content">

<h1>Edit Profile</h1>

<div class="avatar-section">

<img id="avatar-preview" class="avatar-preview" alt="Profile avatar">

<label for="avatarInput" class="avatar-upload-btn" id="uploadBtnLabel">
Change Avatar
</label>

<input type="file" id="avatarInput"
accept="image/png,image/jpeg,image/webp,image/gif">

<div id="avatar-msg"></div>

</div>

<form id="profileForm">

<input type="text" id="username" placeholder="Username" required>

<input type="text" id="name" placeholder="First Name">

<input type="text" id="surname" placeholder="Surname">

<input type="password" id="password"
placeholder="New Password (optional)">

<button type="submit" id="saveBtn">
Save Changes
</button>

</form>

<div id="statusMessage" class="message"></div>

</div>

<script>
const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";
const IMGBB_KEY = "cedf418c6d844af9c47a7775a17161a6";

const userId = localStorage.getItem("user_id");

if (!userId) {
    window.location.href = "index.html";
}

function showMessage(msg, isError = false) {
    const el = document.getElementById("statusMessage");
    el.textContent = msg;
    el.className = "message " + (isError ? "error" : "success");
    el.style.display = "block";
    
    setTimeout(() => {
        el.style.display = "none";
    }, 5000);
}

async function loadProfile() {
    try {
        const res = await fetch(`${API_URL}/api/user/${userId}`);
        if (!res.ok) throw new Error("Failed to load profile");
        
        const data = await res.json();

        document.getElementById("username").value = data.username || "";
        document.getElementById("name").value = data.name || "";
        document.getElementById("surname").value = data.surname || "";

        updateAvatarDisplay(data);

        document.getElementById("loading").style.display = "none";
        document.getElementById("profile-content").style.display = "block";
    } catch (e) {
        console.error("Profile load error:", e);
        document.getElementById("loading").innerHTML = `
            Failed to load profile. 
            <button onclick="location.reload()" style="margin-left: 1rem; padding: 0.5rem 1rem;">Retry</button>
        `;
    }
}

function updateAvatarDisplay(userData) {
    const avatarPreview = document.getElementById("avatar-preview");
    
    if (userData.avatar_url && userData.avatar_url.trim() !== "") {
        // If user has an avatar, show the image
        avatarPreview.src = userData.avatar_url;
        avatarPreview.style.display = "block";
        avatarPreview.style.backgroundColor = "transparent";
        avatarPreview.style.fontSize = ""; // Remove font size
        avatarPreview.innerText = ""; // Clear any text
    } else {
        // No avatar - show initials
        avatarPreview.src = ""; // Clear any src
        avatarPreview.style.display = "flex";
        avatarPreview.style.alignItems = "center";
        avatarPreview.style.justifyContent = "center";
        avatarPreview.style.backgroundColor = "var(--accent-blue)";
        avatarPreview.style.fontSize = "2.5rem";
        
        const firstName = userData.name || "";
        const lastName = userData.surname || "";
        
        if (firstName || lastName) {
            const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
            avatarPreview.innerText = initials || "?";
        } else {
            avatarPreview.innerText = "?";
        }
    }
}

// Function to convert image to base64
function imageToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            // Remove the data:image/[type];base64, prefix
            const base64String = reader.result.split(',')[1];
            resolve(base64String);
        };
        reader.onerror = error => reject(error);
    });
}

document.getElementById("avatarInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const msg = document.getElementById("avatar-msg");
    const uploadBtn = document.getElementById("uploadBtnLabel");
    const avatarPreview = document.getElementById("avatar-preview");
    
    // Show local preview immediately
    const localPreviewUrl = URL.createObjectURL(file);
    avatarPreview.src = localPreviewUrl;
    avatarPreview.style.display = "block";
    avatarPreview.style.backgroundColor = "transparent";
    avatarPreview.style.fontSize = "";
    avatarPreview.innerText = "";
    
    msg.innerText = "Uploading...";
    msg.style.color = "var(--text-muted)";
    uploadBtn.classList.add("uploading");

    // Validate file type
    const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
    if (!validTypes.includes(file.type)) {
        msg.innerText = "Please select a valid image (JPEG, PNG, WEBP, GIF)";
        msg.style.color = "#f87171";
        uploadBtn.classList.remove("uploading");
        URL.revokeObjectURL(localPreviewUrl);
        e.target.value = '';
        return;
    }

    // Validate file size (max 5MB)
    if (file.size > 5 * 1024 * 1024) {
        msg.innerText = "Image too large (max 5MB)";
        msg.style.color = "#f87171";
        uploadBtn.classList.remove("uploading");
        URL.revokeObjectURL(localPreviewUrl);
        e.target.value = '';
        return;
    }

    try {
        // Method 1: Try with FormData first
        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok || !data.data || !data.data.url) {
            console.log("FormData upload failed, trying base64 method...");
            
            // Method 2: Try with base64 if FormData fails
            const base64Image = await imageToBase64(file);
            
            const formData2 = new FormData();
            formData2.append("image", base64Image);
            
            const res2 = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: "POST",
                body: formData2
            });
            
            const data2 = await res2.json();
            
            if (!res2.ok || !data2.data || !data2.data.url) {
                throw new Error(data2.error?.message || "Upload failed");
            }
            
            // Use the successful base64 upload data
            data.data = data2.data;
        }

        const imageURL = data.data.url;
        
        // Update preview with the actual uploaded URL
        avatarPreview.src = imageURL;
        
        msg.innerText = "✓ Avatar uploaded successfully";
        msg.style.color = "#34d399";

        // Update avatar URL in your backend
        const updateRes = await fetch(`${API_URL}/api/user/${userId}/avatar`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                avatar_url: imageURL
            })
        });

        if (!updateRes.ok) {
            console.warn("Avatar URL saved locally but failed to update in database");
            msg.innerText = "✓ Avatar uploaded (saved locally only)";
        }

        // Clear the file input to allow re-uploading the same file
        e.target.value = '';

    } catch (err) {
        console.error("Upload error:", err);
        msg.innerText = "✗ Upload failed - " + (err.message || "please try again");
        msg.style.color = "#f87171";
        
        // Revert to previous avatar or initials
        try {
            const userRes = await fetch(`${API_URL}/api/user/${userId}`);
            const userData = await userRes.json();
            updateAvatarDisplay(userData);
        } catch {
            // If we can't get user data, just show initials from form
            const firstName = document.getElementById("name").value;
            const lastName = document.getElementById("surname").value;
            updateAvatarDisplay({
                avatar_url: null,
                name: firstName,
                surname: lastName
            });
        }
    } finally {
        uploadBtn.classList.remove("uploading");
        if (localPreviewUrl) {
            URL.revokeObjectURL(localPreviewUrl);
        }
    }
});

document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = document.getElementById("saveBtn");
    btn.disabled = true;
    btn.innerText = "Saving...";

    const payload = {
        username: document.getElementById("username").value,
        name: document.getElementById("name").value,
        surname: document.getElementById("surname").value
    };

    if (document.getElementById("password").value) {
        payload.password = document.getElementById("password").value;
    }

    try {
        const res = await fetch(`${API_URL}/api/user/${userId}/profile`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {
            showMessage("Profile updated successfully");
            document.getElementById("password").value = "";
            
            // Update avatar preview if name changed and no avatar exists
            const avatarPreview = document.getElementById("avatar-preview");
            if (!avatarPreview.src || avatarPreview.src === window.location.href) {
                const firstName = payload.name || "";
                const lastName = payload.surname || "";
                
                if (firstName || lastName) {
                    const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
                    avatarPreview.src = "";
                    avatarPreview.style.display = "flex";
                    avatarPreview.style.backgroundColor = "var(--accent-blue)";
                    avatarPreview.style.fontSize = "2.5rem";
                    avatarPreview.innerText = initials;
                }
            }
        } else {
            showMessage(data.error || "Update failed", true);
        }
    } catch (error) {
        console.error("Update error:", error);
        showMessage("Update failed - please try again", true);
    } finally {
        btn.disabled = false;
        btn.innerText = "Save Changes";
    }
});

// Load profile when page loads
loadProfile();
</script>

</body>
</html>
