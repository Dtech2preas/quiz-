<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings - Quiz Platform</title>

<style>

:root{
--bg-dark:#0f172a;
--bg-card:#1e293b;
--text-main:#f8fafc;
--text-muted:#94a3b8;
--accent-blue:#3b82f6;
--accent-hover:#2563eb;
--input-bg:#0f172a;
--border-color:#334155;
--header-bg:#0b1120;
}

body{
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
margin:0;
padding:0;
background:var(--bg-dark);
color:var(--text-main);
}

header{
background:var(--header-bg);
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border-color);
position:sticky;
top:0;
z-index:100;
}

header h2{margin:0}

nav{display:flex;gap:1.5rem}

nav a{
color:var(--text-muted);
text-decoration:none;
font-weight:500;
}

nav a:hover{color:var(--accent-blue)}

.container{
max-width:600px;
margin:2rem auto;
padding:2rem;
background:var(--bg-card);
border-radius:12px;
border:1px solid var(--border-color);
}

h1{text-align:center}

.avatar-section{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:2rem;
}

.avatar-preview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--border-color);
margin-bottom:1rem;
}

.avatar-upload-btn{
background:var(--border-color);
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.avatar-upload-btn:hover{
background:var(--text-muted);
}

input[type=file]{display:none}

form{
display:flex;
flex-direction:column;
gap:1rem;
}

input{
padding:12px;
background:var(--input-bg);
border:1px solid var(--border-color);
border-radius:6px;
color:white;
}

button{
padding:12px;
background:var(--accent-blue);
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:1rem;
}

button:hover{background:var(--accent-hover)}

.message{
margin-top:1rem;
padding:10px;
border-radius:6px;
display:none;
text-align:center;
}

.message.success{
background:#064e3b;
color:#34d399;
}

.message.error{
background:#450a0a;
color:#f87171;
}

#loading{
text-align:center;
margin-top:3rem;
color:var(--text-muted);
}

#profile-content{display:none}

</style>
</head>

<body>

<header>
<h2>Settings</h2>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="subjects.html">Take Quiz</a>
<a href="leaderboard.html">Leaderboards</a>
</nav>

</header>

<div id="loading">Loading profile...</div>

<div class="container" id="profile-content">

<h1>Edit Profile</h1>

<div class="avatar-section">

<img id="avatar-preview" class="avatar-preview"
src="https://via.placeholder.com/120">

<label for="avatarInput" class="avatar-upload-btn" id="uploadBtnLabel">
Change Avatar
</label>

<input type="file" id="avatarInput"
accept="image/png,image/jpeg,image/webp">

<div id="avatar-msg"></div>

</div>

<form id="profileForm">

<input type="text" id="username" placeholder="Username" required>

<input type="text" id="name" placeholder="First Name">

<input type="text" id="surname" placeholder="Surname">

<input type="password" id="password"
placeholder="New Password (optional)">

<button type="submit" id="saveBtn">
Save Changes
</button>

</form>

<div id="statusMessage" class="message"></div>

</div>

<script>

const API_URL="https://billowing-hall-4748.nakiaklocko57.workers.dev";
const IMGBB_KEY="cedf418c6d844af9c47a7775a17161a6";

const userId=localStorage.getItem("user_id");

if(!userId){
window.location.href="index.html";
}

function showMessage(msg,isError=false){

const el=document.getElementById("statusMessage");

el.textContent=msg;

el.className="message "+(isError?"error":"success");

el.style.display="block";

setTimeout(()=>{

el.style.display="none"

},5000)

}

async function loadProfile(){

try{

const res=await fetch(`${API_URL}/api/user/${userId}`);

const data=await res.json();

document.getElementById("username").value=data.username||"";

document.getElementById("name").value=data.name||"";

document.getElementById("surname").value=data.surname||"";

if(data.avatar_url){

document.getElementById("avatar-preview").src=data.avatar_url

}

document.getElementById("loading").style.display="none";

document.getElementById("profile-content").style.display="block";

}catch(e){

document.getElementById("loading").innerText="Failed to load profile";

}

}


document.getElementById("avatarInput").addEventListener("change",async(e)=>{

const file=e.target.files[0];

if(!file)return;

if(file.size>5*1024*1024){

showMessage("Image must be under 5MB",true);

return;

}

const msg=document.getElementById("avatar-msg");

msg.innerText="Uploading...";

try{

const formData=new FormData();

formData.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{

method:"POST",

body:formData

});

const data=await res.json();

if(!data.success){

throw new Error(data.error?.message)

}

const imageURL=data.data.url;

document.getElementById("avatar-preview").src=imageURL;

msg.innerText="Avatar uploaded";

await fetch(`${API_URL}/api/user/${userId}/avatar`,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

avatar_url:imageURL

})

})

}catch(err){

console.error(err);

msg.innerText="Upload failed";

}

});


document.getElementById("profileForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const btn=document.getElementById("saveBtn");

btn.disabled=true;

btn.innerText="Saving...";

const payload={

username:username.value,

name:name.value,

surname:surname.value

};

if(password.value){

payload.password=password.value;

}

try{

const res=await fetch(`${API_URL}/api/user/${userId}/profile`,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(payload)

});

const data=await res.json();

if(res.ok){

showMessage("Profile updated");

password.value="";

}else{

showMessage(data.error,true)

}

}catch{

showMessage("Update failed",true)

}

btn.disabled=false;

btn.innerText="Save Changes";

});

loadProfile();

</script>

</body>
</html>
