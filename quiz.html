<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Grade 12 Quiz Platform</title>

    <!-- Load MathJax for rendering math formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
<script>
// Hamburger Menu Logic
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger-menu');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navMenu.contains(e.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
            }
        });
    }
});
</script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-hover: #059669;
            --accent-red: #ef4444;
            --border-color: #334155;
            --header-bg: #0b1120;
            --option-bg: #334155;
            --option-hover: #475569;
            --option-selected: #2563eb;
            --option-correct: rgba(16, 185, 129, 0.2);
            --option-wrong: rgba(239, 68, 68, 0.2);
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); }

        /* Compact Header / Nav */
        header { background: var(--header-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        nav { display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--accent-blue); }

        /* Responsive Nav */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

        .setup-section, .quiz-section, .result-section { background: var(--bg-card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; border: 1px solid var(--border-color); }

        select, input[type="number"] { padding: 0.8rem; font-size: 1rem; margin-right: 1rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-dark); color: var(--text-main); outline: none; transition: border-color 0.2s; }
        select:focus, input[type="number"]:focus { border-color: var(--accent-blue); }
        button { padding: 0.8rem 1.5rem; background: var(--accent-green); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.05rem; font-weight: 500; transition: background-color 0.2s, transform 0.1s; }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .question-text { font-size: 1.3rem; margin-bottom: 1.5rem; font-weight: 600; line-height: 1.5; color: var(--text-main); }
        .options { display: flex; flex-direction: column; gap: 1rem; }
        .option-btn { padding: 1.2rem; background: var(--option-bg); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; text-align: left; font-size: 1.1rem; color: var(--text-main); transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover { background: var(--option-hover); border-color: #64748b; }

        .option-btn.selected { background: var(--option-selected); border-color: #60a5fa; color: white; }

        /* For Review Section */
        .option-btn.correct { background: var(--option-correct); border-color: var(--accent-green); color: var(--accent-green); }
        .option-btn.wrong { background: var(--option-wrong); border-color: var(--accent-red); color: var(--accent-red); }

        .explanation { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent-blue); border-radius: 4px; display: none; color: var(--text-main); font-size: 0.95rem; }

        .quiz-footer { margin-top: 2rem; display: flex; justify-content: flex-end; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
        #next-btn { background: var(--accent-blue); width: 100%; max-width: 200px; }
        #next-btn:hover { background: #2563eb; }
        #next-btn:disabled { background: var(--border-color); cursor: not-allowed; transform: none; color: var(--text-muted); }

        #loading { text-align: center; font-size: 1.2rem; padding: 2rem; color: var(--text-muted); }

        /* Review Styles */
        .review-item { margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; }
        .review-item:last-child { border-bottom: none; }
        .review-q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-main); }
        .review-options { display: flex; flex-direction: column; gap: 0.5rem; }
        .review-opt { padding: 0.8rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--option-bg); font-size: 1rem; color: var(--text-main); }
        .review-opt.r-correct { background: var(--option-correct); border-color: var(--accent-green); color: #34d399; }
        .review-opt.r-wrong { background: var(--option-wrong); border-color: var(--accent-red); color: #f87171; }
        .explain-btn { margin-top: 1rem; background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 0.5rem 1rem; font-size: 0.9rem; }
        .explain-btn:hover { background: rgba(59, 130, 246, 0.1); }

        /* Hamburger Menu Styles */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--bg-card);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                z-index: 1000;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 0.5rem 1rem;
                padding: 0.5rem;
                border-radius: 4px;
            }

            nav a:hover {
                background-color: var(--bg-main);
            }

            .btn-logout {
                margin: 0.5rem 1rem !important;
                width: calc(100% - 2rem);
            }
        }

    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">Quiz</h2>
    </div>
    <div class="hamburger" id="hamburger-menu">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <nav id="nav-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="subjects.html">Exit Quiz</a>
    </nav>
</header>

<div class="container">
    <div id="loading" style="display: none;">Loading dataset...</div>

    <!-- Quiz Setup -->
    <div id="setup-section" class="setup-section">
        <h2 id="quiz-title">Loading...</h2>
        <p>Choose the number of questions for this quiz:</p>
        <div style="margin-bottom: 1rem;">
            <select id="num-questions-select" onchange="toggleCustomNum()">
                <option value="15">15 Questions</option>
                <option value="30">30 Questions</option>
                <option value="50">50 Questions</option>
                <option value="custom">Custom</option>
            </select>
            <input type="number" id="custom-num" style="display:none;" min="1" max="100" placeholder="Enter number">
        </div>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Active Quiz -->
    <div id="quiz-section" class="quiz-section" style="display:none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--text-muted);">
            <span id="progress-text">Question 1 of 15</span>
        </div>

        <div class="question-text" id="question-text"></div>
        <div class="options" id="options-container"></div>

        <div class="quiz-footer">
            <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
        </div>
    </div>

    <!-- Result Section -->
    <div id="result-section" class="result-section" style="display:none;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Quiz Completed!</h2>
            <p style="font-size: 1.2rem; margin: 1rem 0;">You scored <strong id="final-score"></strong> out of <span id="final-total"></span>.</p>
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">XP Earned: <strong id="xp-earned" style="color:var(--accent-green);">0</strong></p>
            <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
            <button onclick="window.location.href='subjects.html'" style="background:var(--option-bg); color:var(--text-main); border:1px solid var(--border-color); margin-left:1rem;">Take Another Quiz</button>
        </div>

        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">Review Your Answers</h3>
        <div id="review-container"></div>
    </div>
</div>

<script>
    const API_URL = "https://billowing-hall-4748.nakiaklocko57.workers.dev";
    const userId = localStorage.getItem("user_id");

    if (!userId) {
        window.location.href = "index.html";
    }

    // Get subject and file from URL
    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get('subject');
    const filename = urlParams.get('file');

    if (!subject || !filename) {
        window.location.href = "subjects.html";
    }

    let fullDataset = [];
    let quizQuestions = [];
    let currentQuestionIndex = 0;
    let correctAnswersCount = 0;
    let currentTopic = filename.replace('.json', '');
    let userAnswers = []; // Store user answers for review

    // Initialize
    document.getElementById("quiz-title").textContent = currentTopic.replace('paper1_', '').replace('paper2_', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) + " Quiz";

    function toggleCustomNum() {
        const select = document.getElementById("num-questions-select");
        const customInput = document.getElementById("custom-num");
        if (select.value === "custom") {
            customInput.style.display = "inline-block";
        } else {
            customInput.style.display = "none";
        }
    }

    async function loadDataset() {
        document.getElementById("setup-section").style.display = "none";
        document.getElementById("loading").style.display = "block";

        try {
            const response = await fetch(`dataset/${subject}/${filename}`);
            if (!response.ok) throw new Error("Dataset not found");
            const data = await response.json();

            // The JSON files contain an array of objects
            fullDataset = data;

        } catch (error) {
            console.error(error);
            alert("Error loading dataset. Please try again.");
            window.location.href = "subjects.html";
        }
    }

    async function startQuiz() {
        await loadDataset();

        let numQuestions = document.getElementById("num-questions-select").value;
        if (numQuestions === "custom") {
            numQuestions = document.getElementById("custom-num").value;
        }
        numQuestions = parseInt(numQuestions) || 15;

        // Ensure we don't ask for more questions than available
        if (numQuestions > fullDataset.length) {
            numQuestions = fullDataset.length;
        }

        // Shuffle and select
        quizQuestions = [...fullDataset].sort(() => 0.5 - Math.random()).slice(0, numQuestions);

        currentQuestionIndex = 0;
        correctAnswersCount = 0;
        userAnswers = [];

        document.getElementById("loading").style.display = "none";
        document.getElementById("quiz-section").style.display = "block";

        showQuestion();
    }

    function showQuestion() {
        const q = quizQuestions[currentQuestionIndex];

        document.getElementById("progress-text").textContent = `Question ${currentQuestionIndex + 1} of ${quizQuestions.length}`;

        document.getElementById("question-text").innerHTML = q.question;

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        // Combine correct and wrong answers, then shuffle
        let allOptions = [{ text: q.correct_answer, isCorrect: true }];
        // Select up to 3 random wrong answers
        const wrongAnswers = [...q.wrong_answers_pool].sort(() => 0.5 - Math.random()).slice(0, 3);
        wrongAnswers.forEach(w => allOptions.push({ text: w, isCorrect: false }));
        allOptions = allOptions.sort(() => 0.5 - Math.random());

        allOptions.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = opt.text;
            btn.dataset.correct = opt.isCorrect;
            btn.dataset.text = opt.text;
            btn.onclick = () => selectOption(btn);
            optionsContainer.appendChild(btn);
        });

        // Set up Next/Finish button
        const nextBtn = document.getElementById("next-btn");
        nextBtn.style.display = "block";
        nextBtn.disabled = true;

        if (currentQuestionIndex === quizQuestions.length - 1) {
            nextBtn.textContent = "Finish Quiz";
        } else {
            nextBtn.textContent = "Next Question";
        }

        // Tell MathJax to typeset the new math content
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    let selectedBtn = null;

    function selectOption(btn) {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedBtn = btn;

        // Enable next button
        document.getElementById("next-btn").disabled = false;
    }

    async function nextQuestion() {
        if (!selectedBtn) return; // Should not happen due to disabled btn

        const isCorrect = selectedBtn.dataset.correct === "true";
        const selectedText = selectedBtn.dataset.text;
        const q = quizQuestions[currentQuestionIndex];

        // Store result for review later
        userAnswers.push({
            question: q.question,
            correctAnswer: q.correct_answer,
            selectedAnswer: selectedText,
            isCorrect: isCorrect,
            explanation: q.explanation || `The correct answer is: ${q.correct_answer}`
        });

        if (isCorrect) {
            correctAnswersCount++;
        }

        selectedBtn = null;

        if (currentQuestionIndex < quizQuestions.length - 1) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function toggleExplanation(id) {
        const el = document.getElementById(id);
        if (el.style.display === "none" || el.style.display === "") {
            el.style.display = "block";
        } else {
            el.style.display = "none";
        }
    }

    async function finishQuiz() {
        document.getElementById("quiz-section").style.display = "none";
        document.getElementById("loading").textContent = "Saving your results...";
        document.getElementById("loading").style.display = "block";

        try {
            const response = await fetch(`${API_URL}/api/submit-quiz`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    subject: subject,
                    topic: currentTopic,
                    total_questions: quizQuestions.length,
                    correct_answers: correctAnswersCount
                })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("final-score").textContent = correctAnswersCount;
                document.getElementById("final-total").textContent = quizQuestions.length;
                document.getElementById("xp-earned").textContent = `+${data.xp_earned} XP`;

                document.getElementById("loading").style.display = "none";
                document.getElementById("result-section").style.display = "block";

                // Populate Review Container
                const reviewContainer = document.getElementById("review-container");
                reviewContainer.innerHTML = "";

                userAnswers.forEach((ans, idx) => {
                    const item = document.createElement("div");
                    item.className = "review-item";

                    let explanationHtml = "";
                    if (!ans.isCorrect) {
                        explanationHtml = `
                            <button class="explain-btn" onclick="toggleExplanation('expl-${idx}')">Explain</button>
                            <div class="explanation" id="expl-${idx}">
                                <strong>Explanation:</strong>
                                <div>${ans.explanation}</div>
                            </div>
                        `;
                    }

                    item.innerHTML = `
                        <div class="review-q-text">${idx + 1}. ${ans.question}</div>
                        <div class="review-options">
                            <div class="review-opt ${ans.isCorrect ? 'r-correct' : 'r-wrong'}">
                                Your Answer: ${ans.selectedAnswer}
                            </div>
                            ${!ans.isCorrect ? `<div class="review-opt r-correct">Correct Answer: ${ans.correctAnswer}</div>` : ''}
                        </div>
                        ${explanationHtml}
                    `;
                    reviewContainer.appendChild(item);
                });

                if (window.MathJax) {
                    MathJax.typesetPromise([document.getElementById("review-container")]);
                }

            } else {
                alert("Failed to save results: " + data.error);
                window.location.href = "dashboard.html";
            }
        } catch (error) {
            console.error("Submit error:", error);
            alert("Error saving results.");
            window.location.href = "dashboard.html";
        }
    }

</script>

</body>
</html>
